<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VEKTRA v2 — Signal Graph</title>
<!--
  Visualization v2: Force-directed signal graph (D3 v7)
  v2 improvements: curved edges (cubic bezier), glow effects on active nodes,
  animated signal "pulses" that travel along active edges, cleaner node
  type differentiation, and a live waveform sidebar showing signal levels.
-->
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0C;--surface:#111115;--accent:#E8FF47;--text:#EDEFF2;--muted:#44444E;--border:#1E1E26;--font:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px);pointer-events:none;z-index:0}
#wrap{position:relative;z-index:1;width:100%;height:100vh}
svg{width:100%;height:100%}
.link{fill:none;stroke:rgba(232,255,71,0.07);stroke-width:1}
.link.active{stroke:rgba(232,255,71,0.5);stroke-width:1.5}
.node circle{stroke-width:1.5;cursor:grab;transition:filter 0.2s ease}
.node circle:active{cursor:grabbing}
.node.source circle{fill:rgba(232,255,71,0.12);stroke:#E8FF47}
.node.processor circle{fill:rgba(237,239,242,0.05);stroke:#44444E}
.node.output circle{fill:rgba(232,255,71,0.06);stroke:rgba(232,255,71,0.45)}
.node.hovered circle{filter:drop-shadow(0 0 8px rgba(232,255,71,0.6))}
.node.source.hovered circle{fill:rgba(232,255,71,0.25);stroke:#E8FF47}
.node text{font-family:var(--font);font-size:9px;fill:#5A5A66;pointer-events:none;text-anchor:middle}
.node.source text,.node.output text{fill:#8A8A98}
/* Signal pulse dot */
.pulse{fill:#E8FF47;opacity:0}
/* Tooltip */
#tip{position:absolute;pointer-events:none;background:rgba(17,17,21,0.95);border:1px solid var(--border);backdrop-filter:blur(8px);padding:12px 16px;font-size:10px;max-width:220px;line-height:1.7;opacity:0;transition:opacity 0.15s ease;z-index:10}
#tip .t-type{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
#tip .t-name{font-size:13px;font-weight:700;margin-bottom:4px}
#tip .t-desc{color:#8A8A98}
/* Controls */
#ctrls{position:absolute;bottom:20px;left:20px;display:flex;gap:8px;z-index:5}
.cb{font-family:var(--font);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:7px 14px;cursor:pointer;transition:all 0.14s ease}
.cb:hover{color:var(--accent);border-color:rgba(232,255,71,0.3)}
/* Legend */
#legend{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:8px;font-size:10px;color:var(--muted)}
.li{display:flex;align-items:center;gap:8px}
.ld{width:8px;height:8px;border-radius:50%;border:1.5px solid;flex-shrink:0}
/* Waveform bar */
#waveform{position:absolute;top:16px;left:16px;width:180px}
#waveform .wf-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.wf-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.wf-name{font-size:9px;color:var(--muted);width:58px;flex-shrink:0}
.wf-track{flex:1;height:2px;background:var(--border);position:relative;overflow:hidden}
.wf-fill{height:100%;background:var(--accent);width:0%;transition:width 0.1s ease}
.wf-val{font-size:9px;color:#5A5A66;width:30px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div id="wrap">
  <svg id="svg"></svg>
  <div id="tip"><div class="t-type" id="t-type"></div><div class="t-name" id="t-name"></div><div class="t-desc" id="t-desc"></div></div>
  <div id="waveform">
    <div class="wf-label">Signal levels</div>
    <div id="wf-rows"></div>
  </div>
  <div id="legend">
    <div class="li"><div class="ld" style="border-color:#E8FF47;background:rgba(232,255,71,0.12)"></div>source</div>
    <div class="li"><div class="ld" style="border-color:#44444E;background:rgba(237,239,242,0.05)"></div>processor</div>
    <div class="li"><div class="ld" style="border-color:rgba(232,255,71,0.45);background:rgba(232,255,71,0.06)"></div>output</div>
  </div>
  <div id="ctrls">
    <button class="cb" id="btn-reset">↺ reset</button>
    <button class="cb" id="btn-new">⊕ new patch</button>
    <button class="cb" id="btn-pulses">◈ pulses on</button>
  </div>
</div>
<script>
const nodes=[
  {id:'osc1',label:'osc.sine',type:'source',r:18,desc:'Oscillator · 220 Hz · amp 0.82',param:'220 Hz'},
  {id:'osc2',label:'osc.noise',type:'source',r:13,desc:'Bandlimited noise · bw 0.3',param:'1k–4k Hz'},
  {id:'mic',label:'mic.in',type:'source',r:12,desc:'Microphone · 48kHz · 4ms latency',param:'48kHz'},
  {id:'midi',label:'midi.clock',type:'source',r:10,desc:'MIDI clock · 120 BPM',param:'120 BPM'},
  {id:'mouse',label:'mouse.xy',type:'source',r:10,desc:'Cursor position signal · normalized',param:'x:0.62 y:0.31'},
  {id:'env',label:'env.adsr',type:'processor',r:14,desc:'ADSR · A:12ms D:80ms S:0.6 R:340ms',param:'12/80/0.6/340ms'},
  {id:'filt',label:'filt.lpf',type:'processor',r:16,desc:'Low-pass filter · cutoff driven by env',param:'fc: env×8kHz'},
  {id:'delay',label:'delay.tap',type:'processor',r:12,desc:'Tap delay · 3 taps · 250/375/625ms',param:'3 taps'},
  {id:'fft',label:'fft.analyze',type:'processor',r:14,desc:'FFT · 2048 bins · Hann window',param:'2048 bins'},
  {id:'lfo',label:'lfo.tri',type:'processor',r:11,desc:'LFO triangle · 0.25 Hz',param:'0.25 Hz'},
  {id:'map',label:'map.range',type:'processor',r:10,desc:'Range mapper [0,1]→[0.2,4.8]',param:'×4.6'},
  {id:'thresh',label:'thresh.gate',type:'processor',r:10,desc:'Threshold gate · fires at >0.7',param:'thresh 0.7'},
  {id:'shader',label:'shader.frag',type:'processor',r:15,desc:'GLSL fragment shader · 4 uniforms',param:'4 uniforms'},
  {id:'particles',label:'particle.sys',type:'processor',r:13,desc:'Particle system · 4800 pts',param:'4800 pts'},
  {id:'audio',label:'out.audio',type:'output',r:16,desc:'Stereo audio · ASIO · 48kHz',param:'stereo'},
  {id:'display',label:'out.display',type:'output',r:16,desc:'HDMI · 1920×1080 · 60fps',param:'1080p60'},
  {id:'osc_out',label:'out.osc',type:'output',r:10,desc:'OSC → lighting controller · UDP:9000',param:'UDP'},
];
const links=[
  {source:'osc1',target:'env',s:0.9},{source:'osc1',target:'filt',s:0.75},
  {source:'osc2',target:'filt',s:0.4},{source:'mic',target:'fft',s:0.85},
  {source:'mic',target:'thresh',s:0.85},{source:'midi',target:'env',s:0.6},
  {source:'midi',target:'lfo',s:0.5},{source:'mouse',target:'map',s:0.7},
  {source:'env',target:'filt',s:1.0},{source:'env',target:'delay',s:0.5},
  {source:'filt',target:'delay',s:0.8},{source:'filt',target:'audio',s:0.9},
  {source:'delay',target:'audio',s:0.5},{source:'fft',target:'particles',s:0.95},
  {source:'fft',target:'shader',s:0.7},{source:'lfo',target:'shader',s:0.4},
  {source:'map',target:'shader',s:0.6},{source:'thresh',target:'particles',s:0.6},
  {source:'thresh',target:'osc_out',s:0.8},{source:'shader',target:'display',s:1.0},
  {source:'particles',target:'display',s:0.9},{source:'lfo',target:'map',s:0.5},
];
const W=window.innerWidth,H=window.innerHeight;
const svg=d3.select('#svg').attr('viewBox',[0,0,W,H]);
const g=svg.append('g');
const zoom=d3.zoom().scaleExtent([0.2,3]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);
const sim=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>120-d.s*40).strength(0.5))
  .force('charge',d3.forceManyBody().strength(-380))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collide',d3.forceCollide().radius(d=>d.r+20));
// Curved links
const link=g.append('g').selectAll('path').data(links).join('path')
  .attr('class','link').attr('stroke-width',d=>0.5+d.s*1.5)
  .attr('stroke-opacity',d=>0.05+d.s*0.18);
const node=g.append('g').selectAll('g').data(nodes).join('g')
  .attr('class',d=>'node '+d.type)
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=d.fy=null;}));
node.append('circle').attr('r',d=>d.r);
node.append('text').text(d=>d.label).attr('y',d=>d.r+13);
// Tooltip
const tip=document.getElementById('tip');
node.on('mouseenter',(e,d)=>{
  d3.select(e.currentTarget).classed('hovered',true);
  link.classed('active',l=>l.source===d||l.target===d)
    .attr('stroke-opacity',l=>(l.source===d||l.target===d)?0.55:0.05);
  document.getElementById('t-type').textContent=d.type;
  document.getElementById('t-name').textContent=d.label;
  document.getElementById('t-desc').textContent=d.desc+' · '+d.param;
  tip.style.opacity='1';
}).on('mousemove',e=>{
  tip.style.left=Math.min(e.clientX+16,window.innerWidth-240)+'px';
  tip.style.top=(e.clientY-10)+'px';
}).on('mouseleave',e=>{
  d3.select(e.currentTarget).classed('hovered',false);
  link.classed('active',false).attr('stroke-opacity',d=>0.05+d.s*0.18);
  tip.style.opacity='0';
});
// Curved path helper
function linkPath(d){
  const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y;
  const dr=Math.sqrt(dx*dx+dy*dy)*0.7;
  return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
}
sim.on('tick',()=>{
  link.attr('d',linkPath);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
});
// Waveform meters
const meters=[
  {id:'osc1',label:'osc.sine'},{id:'mic',label:'mic.in'},
  {id:'fft',label:'fft.peak'},{id:'env',label:'env.lvl'},
];
const wfRows=document.getElementById('wf-rows');
meters.forEach(m=>{
  const row=document.createElement('div');
  row.className='wf-row';
  row.innerHTML=`<span class="wf-name">${m.label}</span><div class="wf-track"><div class="wf-fill" id="wf-${m.id}"></div></div><span class="wf-val" id="wv-${m.id}">0.00</span>`;
  wfRows.appendChild(row);
});
let wfActive=true;
(function wfLoop(){
  if(!wfActive)return;
  const t=Date.now()/1000;
  meters.forEach((m,i)=>{
    const v=Math.min(0.98,Math.abs(Math.sin(t*(0.7+i*0.31)+i))*0.65+0.08+Math.random()*0.18);
    const f=document.getElementById('wf-'+m.id);
    const val=document.getElementById('wv-'+m.id);
    if(f)f.style.width=(v*100)+'%';
    if(val)val.textContent=v.toFixed(2);
  });
  requestAnimationFrame(wfLoop);
})();
// Pulse animation
let pulsesOn=false;
function firePulse(linkEl,pathEl){
  if(!pulsesOn)return;
  const dot=svg.append('circle').attr('class','pulse').attr('r',3).attr('fill','#E8FF47');
  const len=pathEl.getTotalLength();
  let t=0;
  (function movePulse(){
    if(!pulsesOn){dot.remove();return;}
    t+=0.008;
    if(t>1){dot.remove();return;}
    const pt=pathEl.getPointAtLength(t*len);
    dot.attr('cx',pt.x).attr('cy',pt.y).attr('opacity',Math.sin(t*Math.PI)*0.8);
    requestAnimationFrame(movePulse);
  })();
}
setInterval(()=>{
  if(!pulsesOn)return;
  const paths=document.querySelectorAll('.link');
  if(paths.length){
    const idx=Math.floor(Math.random()*paths.length);
    firePulse(null,paths[idx]);
  }
},600);
document.getElementById('btn-reset').onclick=()=>svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);
document.getElementById('btn-new').onclick=()=>{
  nodes.forEach(n=>{n.x=W*0.2+Math.random()*W*0.6;n.y=H*0.2+Math.random()*H*0.6;});
  sim.alpha(0.8).restart();
};
document.getElementById('btn-pulses').onclick=function(){
  pulsesOn=!pulsesOn;
  this.textContent=pulsesOn?'◈ pulses on':'◻ pulses off';
};
window.addEventListener('resize',()=>{
  const nW=window.innerWidth,nH=window.innerHeight;
  svg.attr('viewBox',[0,0,nW,nH]);
  sim.force('center',d3.forceCenter(nW/2,nH/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
