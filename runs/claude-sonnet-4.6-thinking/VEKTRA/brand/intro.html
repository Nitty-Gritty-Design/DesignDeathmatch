<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VEKTRA — Intro</title>
<!--
  Wildcard 6.3 — Animated brand intro sequence
  Rationale: A cinematic 4-second initialization sequence demonstrates VEKTRA's
  character before any product description. It is skippable. No external JS.
  Timing: specified to the millisecond. Feel: system booting, patch initializing.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0C0C0E;font-family:'JetBrains Mono',monospace}

#stage{position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}

/* Background scanlines — subtle CRT effect */
#stage::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:1}

/* Boot lines — terminal-style text appearing at top */
.boot-lines{position:absolute;top:40px;left:48px;z-index:2;display:flex;flex-direction:column;gap:4px}
.boot-line{font-size:10px;color:rgba(232,255,71,0.4);letter-spacing:0.06em;opacity:0;transform:translateX(-4px)}
.boot-line:nth-child(1){animation:line-in 80ms ease 100ms both}
.boot-line:nth-child(2){animation:line-in 80ms ease 280ms both}
.boot-line:nth-child(3){animation:line-in 80ms ease 460ms both}
.boot-line:nth-child(4){animation:line-in 80ms ease 640ms both}
.boot-line:nth-child(5){animation:line-in 80ms ease 820ms both;color:rgba(232,255,71,0.7)}
@keyframes line-in{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}

/* Center mark */
.mark-wrap{position:relative;z-index:3;margin-bottom:32px}
.mark-svg{opacity:0;animation:mark-fade 200ms ease 960ms both}
@keyframes mark-fade{to{opacity:1}}
.mark-svg .tri-l{clip-path:inset(0 100% 0 0);animation:tri-r 360ms cubic-bezier(0.16,1,0.3,1) 980ms both}
.mark-svg .tri-r{clip-path:inset(0 100% 0 0);animation:tri-r 320ms cubic-bezier(0.16,1,0.3,1) 1120ms both}
@keyframes tri-r{to{clip-path:inset(0 0% 0 0)}}
.mark-glow{position:absolute;inset:-20px;background:radial-gradient(ellipse,rgba(232,255,71,0.18) 0%,transparent 70%);opacity:0;animation:glow-in 600ms ease 1300ms both}
@keyframes glow-in{to{opacity:1}}

/* Logotype */
.logotype{display:flex;z-index:3;margin-bottom:16px}
.ch{font-size:52px;font-weight:700;letter-spacing:4px;color:#F0F0F2;opacity:0;transform:translateY(10px);display:inline-block}
.ch:nth-child(1){animation:ch-in 260ms cubic-bezier(0.16,1,0.3,1) 1400ms both,ch-pulse 200ms ease 3200ms both}
.ch:nth-child(2){animation:ch-in 260ms cubic-bezier(0.16,1,0.3,1) 1450ms both,ch-pulse 200ms ease 3220ms both}
.ch:nth-child(3){animation:ch-in 260ms cubic-bezier(0.16,1,0.3,1) 1500ms both,ch-pulse 200ms ease 3240ms both}
.ch:nth-child(4){animation:ch-in 260ms cubic-bezier(0.16,1,0.3,1) 1550ms both,ch-pulse 200ms ease 3260ms both}
.ch:nth-child(5){animation:ch-in 260ms cubic-bezier(0.16,1,0.3,1) 1600ms both,ch-pulse 200ms ease 3280ms both}
.ch:nth-child(6){animation:ch-in 260ms cubic-bezier(0.16,1,0.3,1) 1650ms both,ch-pulse 200ms ease 3300ms both}
@keyframes ch-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ch-pulse{50%{color:#E8FF47}}

/* Tagline */
.tagline{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(240,240,242,0);z-index:3;animation:tag-in 400ms ease 2100ms both}
@keyframes tag-in{to{color:rgba(240,240,242,0.4)}}

/* Cursor blink */
.cursor-blink{display:inline-block;width:2px;height:14px;background:#E8FF47;margin-left:4px;animation:blink 800ms step-end 2200ms 3}
@keyframes blink{50%{opacity:0}}

/* CTA */
.cta-wrap{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);z-index:3;opacity:0;animation:cta-in 300ms ease 2800ms both}
@keyframes cta-in{to{opacity:1}}
.cta-btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#0C0C0E;background:#E8FF47;border:none;padding:14px 32px;cursor:pointer;transition:all 0.15s ease;text-decoration:none;display:inline-block}
.cta-btn:hover{background:#F2FF78;transform:translateY(-1px)}

/* Skip */
.skip{position:fixed;top:24px;right:24px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(240,240,242,0.25);cursor:pointer;z-index:10;background:none;border:none;transition:color 0.15s ease;animation:skip-in 200ms ease 200ms both;opacity:0}
@keyframes skip-in{to{opacity:1}}
.skip:hover{color:rgba(232,255,71,0.6)}

/* Progress bar */
.progress{position:fixed;bottom:0;left:0;height:1px;background:#E8FF47;opacity:0.5;width:0;animation:prog 4000ms linear 100ms both}
@keyframes prog{to{width:100%}}

/* Redirect overlay */
#done{position:fixed;inset:0;background:#0C0C0E;opacity:0;pointer-events:none;z-index:20;transition:opacity 0.4s ease}
</style>
</head>
<body>

<button class="skip" id="skip-btn" aria-label="Skip intro">skip esc</button>
<div class="progress"></div>
<div id="done"></div>

<div id="stage">
  <div class="boot-lines" aria-hidden="true">
    <div class="boot-line">vektra runtime v0.9.1-beta</div>
    <div class="boot-line">loading signal graph engine...</div>
    <div class="boot-line">audio subsystem: ok · 48kHz · 4ms</div>
    <div class="boot-line">renderer: glsl 4.5 · 1920×1080 · 60fps</div>
    <div class="boot-line">patch environment ready.</div>
  </div>

  <div class="mark-wrap" role="img" aria-label="VEKTRA mark">
    <div class="mark-glow"></div>
    <svg class="mark-svg" width="72" height="72" viewBox="0 0 48 48">
      <polygon class="tri-l" points="4,44 22,4 31,44" fill="#E8FF47"/>
      <polygon class="tri-r" points="25,44 34,9 44,44" fill="#E8FF47" opacity="0.82"/>
      <rect x="4" y="42" width="40" height="2" fill="#E8FF47" opacity="0.4"/>
    </svg>
  </div>

  <div class="logotype" aria-label="VEKTRA">
    <span class="ch">V</span><span class="ch">E</span><span class="ch">K</span>
    <span class="ch">T</span><span class="ch">R</span><span class="ch">A</span>
  </div>

  <div class="tagline">
    sound · motion · code<span class="cursor-blink" aria-hidden="true"></span>
  </div>

  <div class="cta-wrap">
    <a href="index.html" class="cta-btn" id="enter-btn">Enter →</a>
  </div>
</div>

<script>
// Skip on Escape key or skip button
function doSkip() {
  document.getElementById('done').style.opacity = '1';
  document.getElementById('done').style.pointerEvents = 'all';
  setTimeout(() => { window.location.href = 'index.html'; }, 400);
}
document.getElementById('skip-btn').addEventListener('click', doSkip);
document.addEventListener('keydown', e => { if (e.key === 'Escape') doSkip(); });

// Auto-redirect after sequence ends (4.2s)
setTimeout(() => {
  // Don't auto-redirect — let user click CTA
}, 4200);
</script>
</body>
</html>
