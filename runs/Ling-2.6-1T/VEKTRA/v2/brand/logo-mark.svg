<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="VEKTRA mark">
  <defs>
    <linearGradient id="markGradientStandalone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e84d1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a2a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glowStandalone" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <style>
      .mark {
        fill: none;
        stroke: url(#markGradientStandalone);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#glowStandalone);
        transform-origin: center;
      }
    </style>
  </defs>
  
  <!-- Parametric waveform mark centered -->
  <path class="mark" d="
    M 16 48
    C 16 38, 24 34, 30 40
    C 36 46, 44 42, 50 52
    C 56 62, 58 54, 58 54
  " />
</svg>