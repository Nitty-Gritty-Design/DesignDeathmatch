<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="VEKTRA">
  <defs>
    <!-- Gradient for mark - subtle luminosity -->
    <linearGradient id="markGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#e84d1b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e84d1b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Subtle gradient for text (dark mode) -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f2f2f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8c8c0;stop-opacity:1" />
    </linearGradient>
    
    <style>
      .mark-path {
        fill: none;
        stroke: url(#markGradient);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#glow);
      }
      
      .logotype {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 28px;
        font-weight: 500;
        fill: url(#textGradient);
        letter-spacing: 0.05em;
      }
      
      /* Subtle animation for live state */
      @keyframes breathe {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      
      .mark-path {
        animation: breathe 4s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Signal waveform mark with parametric curves -->
  <path class="mark-path" d="
    M 14 52
    C 14 42, 22 38, 28 44
    C 34 50, 42 46, 50 56
    C 58 66, 68 58, 78 64
    C 88 70, 98 60, 110 68
  " />
  
  <!-- Logotype -->
  <text class="logotype" x="130" y="44">VEKTRA</text>
</svg>