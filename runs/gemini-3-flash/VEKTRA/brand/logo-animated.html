<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEKTRA Logo Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--color-bg-primary);
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mark {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid var(--color-accent);
            box-sizing: border-box;
            opacity: 0;
            animation: drawFrame 0.8s var(--ease-out-expo) forwards;
        }

        @keyframes drawFrame {
            0% { 
                clip-path: inset(0 100% 100% 0); 
                opacity: 0;
            }
            100% { 
                clip-path: inset(0 0 0 0); 
                opacity: 1;
            }
        }

        .bar {
            position: absolute;
            bottom: 8px;
            width: 4px;
            background-color: var(--color-accent);
            transform-origin: bottom;
            transform: scaleY(0);
            opacity: 0;
        }

        .bar-1 { left: 8px; height: 12px; animation: growBar 0.4s var(--ease-out-expo) 0.6s forwards, flicker 0.1s step-end 0.6s 3; }
        .bar-2 { left: 18px; height: 24px; animation: growBar 0.5s var(--ease-out-expo) 0.7s forwards, flicker 0.1s step-end 0.7s 4; }
        .bar-3 { left: 28px; height: 18px; animation: growBar 0.4s var(--ease-out-expo) 0.8s forwards, flicker 0.1s step-end 0.8s 2; }

        @keyframes growBar {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .logotype {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 32px;
            color: var(--color-text-primary);
            letter-spacing: 0.4em;
            opacity: 0;
            transform: translateX(10px);
            animation: revealType 1.2s var(--ease-out-expo) 1s forwards;
        }

        @keyframes revealType {
            0% { 
                opacity: 0; 
                letter-spacing: 0.4em; 
                transform: translateX(10px);
            }
            100% { 
                opacity: 1; 
                letter-spacing: 0.1em; 
                transform: translateX(0);
            }
        }

        /* Controls for replay */
        .replay-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            padding: 4px 12px;
            font-family: var(--font-mono);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .replay-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }
    </style>
</head>
<body>
    <div class="logo-container" id="logo">
        <div class="mark">
            <div class="frame"></div>
            <div class="bar bar-1"></div>
            <div class="bar bar-2"></div>
            <div class="bar bar-3"></div>
        </div>
        <div class="logotype">VEKTRA</div>
    </div>

    <button class="replay-btn" onclick="location.reload()">REPLAY_SIGNAL</button>
</body>
</html>
