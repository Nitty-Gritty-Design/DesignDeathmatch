<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VEKTRA v2 Generative Background — 3D Particle Field</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #08080d; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
  <!-- Using Three.js via CDN for WebGL 3D particle system — more performant and visually complex than 2D Canvas for premium generative background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
    document.body.appendChild(renderer.domElement);

    // Mouse tracking
    const mouse = { x:0, y:0 };
    document.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 -1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 +1;
    });

    // Particle system (2000 particles for dense premium field)
    const particleCount = 2000;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);

    // Initialize particles in a spherical cloud
    for (let i=0; i<particleCount; i++) {
      const i3 = i*3;
      // Spherical distribution
      const radius = 50 + Math.random() * 100; // 50-150 units from center
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() -1);
      positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
      positions[i3+1] = radius * Math.sin(phi) * Math.sin(theta);
      positions[i3+2] = radius * Math.cos(phi);
      // Accent color with slight hue variation
      const hue = 0.52 + Math.random() * 0.03; // Cyan hue range
      colors[i3] = 0; colors[i3+1] = 0.92; colors[i3+2] = 1; // RGB for #00ecff
      sizes[i] = Math.random() * 1.5 + 0.5;
    }

    // Geometry
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Material (custom shader for glow)
    const material = new THREE.PointsMaterial({
      size: 1.5,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // Camera position
    camera.position.z = 120;

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Rotate particles slowly
      particles.rotation.y += 0.0005;
      particles.rotation.x += 0.0003;

      // React to mouse: tilt scene slightly
      particles.rotation.y += mouse.x * 0.0005;
      particles.rotation.x += mouse.y * 0.0005;

      // Particle oscillation (wave motion)
      const positions = geometry.attributes.position.array;
      for (let i=0; i<particleCount; i++) {
        const i3 = i*3;
        const time = Date.now() * 0.001;
        positions[i3+1] += Math.sin(time + positions[i3] * 0.01) * 0.01;
      }
      geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
