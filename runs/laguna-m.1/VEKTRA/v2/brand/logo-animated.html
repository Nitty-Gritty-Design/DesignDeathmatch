<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA Logo v2</title>
  <style>
    @import url('../tokens.css');
    
    body {
      margin: 0;
      padding: 2rem;
      background: var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .logo-container {
      width: 240px;
    }
    
    svg {
      width: 100%;
      height: auto;
    }
    
    .mark-line {
      fill: none;
      stroke: var(--color-accent);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    .mark-line:nth-child(1) { animation-delay: 0s; }
    .mark-line:nth-child(2) { animation-delay: 0.1s; }
    .mark-line:nth-child(3) { animation-delay: 0.2s; }
    .mark-line:nth-child(4) { animation-delay: 0.3s; }
    
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    
    .intersection {
      fill: var(--color-accent);
      opacity: 0;
      animation: pulse 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    }
    
    @keyframes pulse {
      0% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1.4); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .logotype {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 32px;
      letter-spacing: -0.04em;
      fill: var(--color-text-primary);
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1s forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70">
      <g transform="translate(28, 35)">
        <!-- Top triangle -->
        <path class="mark-line" d="M 0 0 L 15 -26 L 30 0"/>
        <!-- Bottom triangle -->
        <path class="mark-line" d="M 0 2 L 15 28 L 30 2"/>
        <!-- Center connection -->
        <path class="mark-line" d="M 15 -26 L 15 28"/>
        <!-- Intersection point -->
        <circle class="intersection" cx="15" cy="1" r="2"/>
      </g>
      <text x="76" y="46" class="logotype">VEKTRA</text>
    </svg>
  </div>
</body>
</html>
