<!-- VEKTRA Generative Background -->
<!-- Wildcard 6.1: Full-viewport Canvas animation that functions as a living background -->
<!-- Signal field that oscillates, breathes, and reacts to mouse movement -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA — Signal Field</title>
  <style>
    :root {
      --color-bg-primary: #0a0a0a;
      --color-surface: #1a1a1a;
      --color-accent: #ff8c00;
      --color-border: #2a2a2a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      overflow: hidden;
      background: var(--color-bg-primary);
      font-family: 'JetBrains Mono', monospace;
      color: var(--color-text-primary);
    }
    
    #signal-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    
    .info {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      color: var(--color-text-secondary);
      font-size: 12px;
      z-index: 10;
    }
    
    .info a {
      color: var(--color-accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <canvas id="signal-canvas"></canvas>
  <div class="info">
    Move cursor to influence the signal field. <a href="../site/index.html">Back to site</a>
  </div>
  
  <script>
    // Generative animated background for VEKTRA
    // Vanilla JS Canvas API — no libraries, 60fps, mouse-reactive signal field
    const canvas = document.getElementById('signal-canvas');
    const ctx = canvas.getContext('2d');
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    let mouseX = 0.5;
    let mouseY = 0.5;
    let time = 0;
    
    const points = [];
    const pointCount = 150;
    
    for (let i = 0; i < pointCount; i++) {
      points.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        radius: Math.random() * 2 + 1,
        phase: Math.random() * Math.PI * 2
      });
    }
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      const centerX = width * mouseX;
      const centerY = height * mouseY;
      
      points.forEach((p, i) => {
        // Mouse attraction
        const dx = centerX - p.x;
        const dy = centerY - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 0 && dist < 300) {
          const force = (300 - dist) / 300;
          p.vx += (dx / dist) * force * 0.01;
          p.vy += (dy / dist) * force * 0.01;
        }
        
        // Update position
        p.x += p.vx;
        p.y += p.vy;
        
        // Boundary
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        
        // Pulse effect
        const pulse = Math.sin(time * 0.02 + p.phase) * 0.5 + 0.5;
        const size = p.radius * (0.5 + pulse * 0.5);
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 140, 0, ${0.3 + pulse * 0.3})`;
        ctx.fill();
        
        // Connect nearby points
        for (let j = i + 1; j < points.length; j++) {
          const q = points[j];
          const dx2 = p.x - q.x;
          const dy2 = p.y - q.y;
          const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          
          if (dist2 < 100) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `rgba(255, 140, 0, ${0.1 * (1 - dist2 / 100)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      });
      
      time++;
      requestAnimationFrame(draw);
    }
    
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX / width;
      mouseY = e.clientY / height;
    });
    
    resize();
    draw();
  </script>
</body>
</html>
