<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA Logo Animation</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: var(--color-bg-primary, #0a0a0a);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .logo-container {
      width: 200px;
    }
    svg {
      width: 100%;
      height: auto;
    }
    .mark-line {
      fill: none;
      stroke: var(--color-accent, #ff8c00);
      stroke-width: 2;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 0.8s ease-out forwards;
    }
    .mark-line:nth-child(1) { animation-delay: 0s; }
    .mark-line:nth-child(2) { animation-delay: 0.1s; }
    .mark-line:nth-child(3) { animation-delay: 0.2s; }
    .mark-line:nth-child(4) { animation-delay: 0.3s; }
    
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    
    .intersection {
      fill: var(--color-accent, #ff8c00);
      opacity: 0;
      animation: pulse 0.4s ease-out 0.8s forwards;
    }
    
    @keyframes pulse {
      0% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1.3); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .logotype {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.03em;
      fill: var(--color-text-primary, #f0f0f0);
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1s forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
      <g transform="translate(10, 10)">
        <path class="mark-line" d="M 0 20 L 15 5"/>
        <path class="mark-line" d="M 25 5 L 40 20"/>
        <path class="mark-line" d="M 0 35 L 15 35"/>
        <path class="mark-line" d="M 25 35 L 40 20"/>
        <circle class="intersection" cx="20" cy="20" r="2"/>
      </g>
      <text x="70" y="38" class="logotype">VEKTRA</text>
    </svg>
  </div>
</body>
</html>
