<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <style>
      .mark { fill: none; stroke: var(--color-accent, #ff8c00); stroke-width: 2; }
      .logotype { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.03em; fill: var(--color-text-primary, #f0f0f0); }
    </style>
  </defs>
  <!-- Mark: 2x2 grid with intersecting lines -->
  <g transform="translate(10, 10)">
    <!-- Top-left: rising waveform angle -->
    <path class="mark" d="M 0 20 L 15 5"/>
    <!-- Top-right: descending vector -->
    <path class="mark" d="M 25 5 L 40 20"/>
    <!-- Bottom-left: sustained signal -->
    <path class="mark" d="M 0 35 L 15 35"/>
    <!-- Bottom-right: empty space creates tension -->
    <path class="mark" d="M 25 35 L 40 20"/>
    <!-- Central intersection -->
    <circle cx="20" cy="20" r="2" fill="var(--color-accent, #ff8c00)"/>
  </g>
  <!-- Logotype -->
  <text x="70" y="38" class="logotype">VEKTRA</text>
</svg>
