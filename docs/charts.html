<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benchmark Charts - DesignDeathmatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 32px;
      margin: 32px 0;
    }
  <style>
    :root {
      --color-accent-vibrant: #4a9eff;
      --color-accent-purple: #8e7dff;
      --color-accent-pink: #d16ba5;
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --glass-bg: rgba(0, 0, 0, 0.02);
        --glass-border: rgba(0, 0, 0, 0.08);
      }
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 24px;
      margin: 32px 0;
    }
    
    .chart-container {
      background: var(--color-surface);
      background-image: linear-gradient(135deg, var(--glass-bg) 0%, transparent 100%);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      height: 450px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .chart-container:hover {
      border-color: var(--color-accent-vibrant);
    }

    .chart-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--color-accent-vibrant), var(--color-accent-purple));
      opacity: 0.5;
    }

    .chart-wrapper {
      flex: 1;
      position: relative;
      min-height: 0;
      margin-top: 12px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      flex-shrink: 0;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--color-text-primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-title::after {
      content: '';
      width: 12px;
      height: 2px;
      background: var(--color-accent-vibrant);
    }

    .chart-controls {
      display: flex;
      gap: 8px;
      max-width: 100%;
    }

    select {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-size: 11px;
      font-family: var(--font-mono);
      outline: none;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    select:focus {
      border-color: var(--color-accent-vibrant);
    }

    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
      .chart-container { height: 400px; padding: 16px; }
      select { max-width: 120px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px;">
        <div style="max-width: 400px; width: 100%;">
          <a href="index.html"><img src="assets/DesignDeathmatch_Logo.png" alt="DesignDeathmatch Logo" class="logo-img" style="max-width: 100%; height: auto;"></a>
        </div>
        <nav style="display: flex; gap: 24px;">
          <a href="index.html" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px;">Gallery</a>
          <a href="charts.html" style="color: var(--color-text-primary); text-decoration: none; font-family: var(--font-mono); font-size: 14px; font-weight: 600;">Charts</a>
          <a href="framework/index.html" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px;">Framework</a>
          <a href="scoring.html" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px;">Scoring</a>
          <a href="https://github.com/Nitty-Gritty-Design/DesignDeathmatch" target="_blank" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px; display: flex; align-items: center; gap: 6px;">
            <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" style="opacity: 0.7;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            GitHub
          </a>
        </nav>
      </div>
      <p class="tagline">Interactive Benchmark Intelligence</p>
    </div>
  </header>

  <main class="main">
    <div class="container">
      
      <!-- Leaderboard Header (Full Width) -->
      <div class="chart-container" style="height: 550px; margin-top: 32px; background-image: radial-gradient(circle at top right, rgba(0, 242, 255, 0.05), transparent);">
        <div class="chart-header">
          <div class="chart-title">Global Leaderboard / Weighted Design Score</div>
        </div>
        <div class="chart-wrapper">
          <canvas id="rankingChart"></canvas>
        </div>
      </div>

      <div class="charts-grid">
        <!-- Radar Chart: Phase Performance -->
        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">Phase Analysis</div>
            <div class="chart-controls">
              <select id="radar-model-1"></select>
              <select id="radar-model-2"></select>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="radarChart"></canvas>
          </div>
        </div>

        <!-- Bar Chart: V1 vs V2 -->
        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">Iteration Delta</div>
          </div>
          <div class="chart-wrapper">
            <canvas id="v1v2Chart"></canvas>
          </div>
        </div>

        <!-- Scatter Chart: Automated vs Human -->
        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">Validation Consistency</div>
          </div>
          <div class="chart-wrapper">
            <canvas id="scatterChart"></canvas>
          </div>
        </div>

        <!-- Distribution Chart: Phase Averages -->
        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">Difficulty Index</div>
          </div>
          <div class="chart-wrapper">
            <canvas id="phaseAvgChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 DesignDeathmatch. Interactive benchmark analytics.</p>
    </div>
  </footer>

  <script src="js/charts.js"></script>
</body>
</html>
