<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA — System Initialization</title>
  <!-- 6.3 Wildcard v2: A precise 3.8-second initialization sequence.
       Improved over v1: signal traces animate in from both sides toward the vertex,
       the vertex chamber resolves with a double-pulse echo, and the logotype
       fades in with a rightward sweep. Skip available. CSS-only. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080706; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; font-family: 'JetBrains Mono',monospace;
    }
    .intro { max-width: 540px; text-align: center; position: relative; }

    /* Signal traces — draw from sides toward center */
    .signal-line {
      position: absolute; top: 170px; height: 1px; background: #C8751E; opacity: 0;
    }
    .signal-left {
      left: 0; right: 50%; transform-origin: right center;
      animation: traceLeftIn 0.9s 0.2s cubic-bezier(0.16,0,0.08,1) forwards;
    }
    .signal-right {
      right: 0; left: 50%; transform-origin: left center;
      animation: traceRightIn 0.9s 0.2s cubic-bezier(0.16,0,0.08,1) forwards;
    }
    @keyframes traceLeftIn { 0% { opacity: 0; transform: scaleX(0); } 30% { opacity: 0.6; } 100% { opacity: 0; transform: scaleX(1); } }
    @keyframes traceRightIn { 0% { opacity: 0; transform: scaleX(0); } 30% { opacity: 0.6; } 100% { opacity: 0; transform: scaleX(1); } }

    /* Vertex chamber */
    .chamber { margin: 60px auto 32px; position: relative; width: 48px; height: 48px; }
    .chamber-ring {
      position: absolute; inset: 0; border: 2px solid #C8751E; border-radius: 50%;
      opacity: 0;
    }
    .chamber-ring.outer {
      animation: ringAppear 0.45s 0.4s cubic-bezier(0.32,0.72,0,1) forwards,
                 ringPulse 0.5s 2.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .chamber-ring.inner {
      width: 20px; height: 20px; left: 12px; top: 12px;
      animation: ringAppear 0.35s 0.5s cubic-bezier(0.32,0.72,0,1) forwards;
    }
    .chamber-core {
      position: absolute; width: 8px; height: 8px; left: 20px; top: 20px;
      background: #C8751E; border-radius: 50%; opacity: 0;
      animation: coreReveal 0.55s 0.35s cubic-bezier(0.16,0,0.08,1) forwards;
    }
    .chamber-glow {
      position: absolute; inset: -16px; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,117,30,0.25) 0%, transparent 70%);
      opacity: 0;
      animation: glowFade 0.8s 0.15s ease-out forwards,
                 echoPulse 0.5s 2.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes ringAppear { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes coreReveal { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes glowFade { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.4); } 100% { opacity: 0.3; transform: scale(1); } }
    @keyframes ringPulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.8); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes echoPulse { 0% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.6); } 100% { opacity: 0.3; transform: scale(1); } }

    /* Logotype */
    .logotype { display: flex; justify-content: center; gap: 5px; margin-bottom: 36px; }
    .logotype span {
      font-family: 'JetBrains Mono',monospace; font-size: 44px; font-weight: 700;
      color: #E8E4DE; opacity: 0; animation: letterLand 0.12s cubic-bezier(0.16,0,0.08,1) forwards;
    }
    .logotype span:nth-child(1) { animation-delay: 1.3s; }
    .logotype span:nth-child(2) { animation-delay: 1.36s; }
    .logotype span:nth-child(3) { animation-delay: 1.42s; }
    .logotype span:nth-child(4) { animation-delay: 1.48s; }
    .logotype span:nth-child(5) { animation-delay: 1.54s; }
    .logotype span:nth-child(6) { animation-delay: 1.60s; }
    @keyframes letterLand { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    /* Statement */
    .statement {
      font-family: 'Space Grotesk',sans-serif; font-size: 1.15rem; color: #A09890;
      max-width: 400px; margin: 0 auto 40px; line-height: 1.55; opacity: 0;
      animation: statementRise 0.6s 2.1s cubic-bezier(0.16,0,0.08,1) forwards;
    }
    @keyframes statementRise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* CTA */
    .cta {
      display: inline-block; padding: 12px 28px; background: #C8751E; color: #080706;
      font-family: 'Space Grotesk',sans-serif; font-size: 0.875rem; font-weight: 500;
      text-decoration: none; border-radius: 4px; opacity: 0;
      animation: ctaSettle 0.4s 2.7s cubic-bezier(0.16,0,0.08,1) forwards;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .cta:hover { background: #E8A040; }
    @keyframes ctaSettle { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* Skip */
    .skip {
      position: fixed; bottom: 32px; right: 32px;
      font-family: 'JetBrains Mono',monospace; font-size: 0.625rem; color: #4A443E;
      cursor: pointer; border: 1px solid #282420; background: transparent;
      padding: 6px 14px; border-radius: 4px; transition: color 0.15s, border-color 0.15s;
    }
    .skip:hover { color: #E8E4DE; border-color: #C8751E; }

    /* Done state */
    .done .statement, .done .cta, .done .logotype span,
    .done .chamber-ring, .done .chamber-core, .done .chamber-glow {
      animation: none; opacity: 1; transform: none;
    }
  </style>
</head>
<body>
  <div class="intro" id="intro">
    <div style="position:relative;height:170px">
      <div class="signal-line signal-left"></div>
      <div class="signal-line signal-right"></div>
    </div>
    <div class="chamber">
      <div class="chamber-glow"></div>
      <div class="chamber-ring outer"></div>
      <div class="chamber-ring inner"></div>
      <div class="chamber-core"></div>
    </div>
    <div class="logotype"><span>V</span><span>E</span><span>K</span><span>T</span><span>R</span><span>A</span></div>
    <p class="statement">Time is not a line. Time is a signal you can route.</p>
    <a href="../site/index.html" class="cta">Enter VEKTRA</a>
  </div>
  <button class="skip" id="skipBtn">Skip intro</button>

  <script>
    var intro = document.getElementById('intro');
    var timer = setTimeout(function () { intro.classList.add('done'); }, 3900);
    document.getElementById('skipBtn').addEventListener('click', function () {
      clearTimeout(timer); intro.classList.add('done');
    });
  </script>
</body>
</html>
