<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEKTRA v2 — Logo Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0C0B0A;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .container { width: 400px; height: 160px; position: relative; }
  svg { width: 100%; height: 100%; }
  .trace-left, .trace-right {
    fill: none; stroke: #E8E4DE; stroke-width: 3;
    stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 250; stroke-dashoffset: 250;
    animation: traceDraw 1.4s 0.4s cubic-bezier(0.16,0.0,0.08,1.0) forwards;
  }
  .chamber-outer {
    fill: none; stroke: #C8751E; stroke-width: 2.5;
    stroke-dasharray: 40; stroke-dashoffset: 40;
    animation: ringDraw 0.5s 0.15s cubic-bezier(0.32,0.72,0.0,1.0) forwards;
  }
  .chamber-inner {
    fill: #0C0B0A;
    animation: innerCollapse 0.6s 0.1s cubic-bezier(0.16,0.0,0.08,1.0) forwards;
  }
  .chamber-glow {
    opacity: 0;
    animation: glowPulse 0.8s 0.05s ease-out forwards,
               settlePulse 0.6s 2.6s cubic-bezier(0.34,1.56,0.64,1.0) forwards;
  }
  .letter {
    font-family: 'JetBrains Mono','SF Mono',monospace;
    font-size: 46px; font-weight: 700; fill: #E8E4DE;
    opacity: 0;
    animation: letterIn 0.12s cubic-bezier(0.16,0.0,0.08,1.0) forwards;
  }
  .l1 { animation-delay: 1.8s; } .l2 { animation-delay: 1.86s; }
  .l3 { animation-delay: 1.92s; } .l4 { animation-delay: 1.98s; }
  .l5 { animation-delay: 2.04s; } .l6 { animation-delay: 2.10s; }
  @keyframes traceDraw { to { stroke-dashoffset: 0; } }
  @keyframes ringDraw { to { stroke-dashoffset: 0; } }
  @keyframes innerCollapse {
    0% { r: 0; } 50% { r: 8; } 100% { r: 3; }
  }
  @keyframes glowPulse {
    0% { opacity: 0; r: 2; }
    50% { opacity: 0.9; r: 22; }
    100% { opacity: 0; r: 14; }
  }
  @keyframes settlePulse {
    0% { opacity: 0; }
    50% { opacity: 0.7; }
    100% { opacity: 0.2; }
  }
  @keyframes letterIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
    <defs>
      <radialGradient id="chamberGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#E8A040" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#C8751E" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle fill="url(#chamberGlow)" cx="80" cy="132" r="14" class="chamber-glow"/>
    <polyline class="trace-left" points="18,6 26,22 34,40 42,58 50,76 58,94 66,112 74,128 80,132"/>
    <polyline class="trace-right" points="80,132 86,128 94,112 102,94 110,76 118,58 126,40 134,22 142,6"/>
    <circle class="chamber-outer" cx="80" cy="132" r="6"/>
    <circle class="chamber-inner" cx="80" cy="132" r="3"/>
    <text class="letter l1" x="172" y="91">V</text>
    <text class="letter l2" x="208" y="91">E</text>
    <text class="letter l3" x="244" y="91">K</text>
    <text class="letter l4" x="280" y="91">T</text>
    <text class="letter l5" x="316" y="91">R</text>
    <text class="letter l6" x="352" y="91">A</text>
  </svg>
</div>
</body>
</html>
