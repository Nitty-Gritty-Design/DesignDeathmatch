<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA — Signal Visualization</title>
  <!-- Using D3 for the network graph overlay — lightweight, natural fit for SVG-based node visualization -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @import url('../brand/tokens.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: var(--space-8);
    }

    .viz-header {
      max-width: 1200px;
      margin: 0 auto var(--space-8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
    }

    .viz-header a {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      transition: color 0.15s;
    }

    .viz-header a:hover {
      color: var(--color-accent);
    }

    .viz-title {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text-primary);
    }

    .viz-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
    }

    .viz-panel {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      position: relative;
    }

    .viz-panel.full {
      grid-column: 1 / -1;
    }

    .viz-panel-title {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-accent);
      margin-bottom: var(--space-4);
    }

    .viz-panel canvas,
    .viz-panel svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius-md);
    }

    .viz-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .viz-label {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: var(--color-text-muted);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 4px;
      background: var(--color-border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-accent);
      cursor: pointer;
    }

    .viz-legend {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }

    .viz-legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-mono);
      font-size: 0.625rem;
      color: var(--color-text-muted);
    }

    .viz-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .viz-tooltip {
      position: absolute;
      background: var(--color-surface);
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: var(--color-text-primary);
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      display: none;
    }

    /* D3 node styles */
    .node circle {
      stroke: var(--color-border);
      stroke-width: 1.5;
      cursor: crosshair;
      transition: r 0.2s var(--ease-signal);
    }

    .node text {
      font-family: var(--font-mono);
      font-size: 9px;
      fill: var(--color-text-secondary);
      pointer-events: none;
    }

    .link {
      stroke: var(--color-border);
      stroke-width: 1;
      stroke-opacity: 0.5;
    }

    .link.active {
      stroke: var(--color-accent);
      stroke-opacity: 0.8;
      stroke-width: 1.5;
    }

    @media (max-width: 767px) {
      .viz-grid {
        grid-template-columns: 1fr;
      }
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="viz-header">
    <h1 class="viz-title">signal.viz</h1>
    <a href="index.html">&larr; Back to VEKTRA</a>
  </div>

  <div class="viz-grid">
    <!-- Panel 1: Frequency Spectrum -->
    <div class="viz-panel" id="spectrumPanel">
      <div class="viz-panel-title">Frequency Spectrum</div>
      <div class="viz-toolbar">
        <label class="viz-label">
          <span>Range</span>
          <input type="range" min="0" max="100" value="100" id="rangeSlider">
        </label>
        <label class="viz-label">
          <span>Smooth</span>
          <input type="range" min="0" max="100" value="30" id="smoothSlider">
        </label>
      </div>
      <canvas id="spectrumCanvas" width="560" height="300"></canvas>
    </div>

    <!-- Panel 2: Waveform -->
    <div class="viz-panel" id="waveformPanel">
      <div class="viz-panel-title">Time Domain — 4 Oscillators</div>
      <div class="viz-toolbar">
        <label class="viz-label">
          <span>Speed</span>
          <input type="range" min="1" max="20" value="5" id="speedSlider">
        </label>
      </div>
      <canvas id="waveformCanvas" width="560" height="300"></canvas>
    </div>

    <!-- Panel 3: Signal Graph (D3) -->
    <div class="viz-panel full" id="graphPanel">
      <div class="viz-panel-title">Signal Graph — VEKTRA Patch Example</div>
      <div class="viz-toolbar">
        <span class="viz-label" style="color: var(--color-text-muted);">
          Click nodes to inspect connections. Drag to rearrange.
        </span>
      </div>
      <div class="viz-legend">
        <div class="viz-legend-item"><span class="viz-legend-dot" style="background: var(--color-accent);"></span> Source</div>
        <div class="viz-legend-item"><span class="viz-legend-dot" style="background: #9E9890;"></span> Process</div>
        <div class="viz-legend-item"><span class="viz-legend-dot" style="background: #5C5650;"></span> Output</div>
      </div>
      <svg id="graphSvg" width="1100" height="400"></svg>
      <div class="viz-tooltip" id="graphTooltip"></div>
    </div>
  </div>

  <script>
    // ── Frequency Spectrum ──
    (function() {
      var canvas = document.getElementById('spectrumCanvas');
      var ctx = canvas.getContext('2d');
      var rangeSlider = document.getElementById('rangeSlider');
      var smoothSlider = document.getElementById('smoothSlider');

      var bins = [
        { label: '20', value: 0.08, freq: 20 },
        { label: '30', value: 0.14, freq: 31 },
        { label: '40', value: 0.22, freq: 40 },
        { label: '50', value: 0.31, freq: 50 },
        { label: '63', value: 0.38, freq: 63 },
        { label: '80', value: 0.51, freq: 80 },
        { label: '100', value: 0.35, freq: 100 },
        { label: '125', value: 0.27, freq: 125 },
        { label: '160', value: 0.61, freq: 160 },
        { label: '200', value: 0.74, freq: 200 },
        { label: '250', value: 0.45, freq: 250 },
        { label: '315', value: 0.32, freq: 315 },
        { label: '400', value: 0.82, freq: 400 },
        { label: '500', value: 0.90, freq: 500 },
        { label: '630', value: 0.58, freq: 630 },
        { label: '800', value: 0.41, freq: 800 },
        { label: '1k', value: 0.76, freq: 1000 },
        { label: '1.2k', value: 0.53, freq: 1250 },
        { label: '1.6k', value: 0.37, freq: 1600 },
        { label: '2k', value: 0.29, freq: 2000 },
        { label: '2.5k', value: 0.50, freq: 2500 },
        { label: '3.1k', value: 0.65, freq: 3150 },
        { label: '4k', value: 0.43, freq: 4000 },
        { label: '5k', value: 0.28, freq: 5000 },
        { label: '6.3k', value: 0.21, freq: 6300 },
        { label: '8k', value: 0.33, freq: 8000 },
        { label: '10k', value: 0.40, freq: 10000 },
        { label: '12k', value: 0.18, freq: 12500 },
        { label: '16k', value: 0.12, freq: 16000 },
        { label: '20k', value: 0.06, freq: 20000 }
      ];

      var time = 0;

      function drawSpectrum() {
        var w = canvas.width;
        var h = canvas.height;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.clearRect(0, 0, w, h);

        var range = parseInt(rangeSlider.value) / 100;
        var smooth = parseInt(smoothSlider.value) / 100;

        var barW = (w - 60) / bins.length;
        var maxH = h - 60;

        time += 0.02;

        for (var i = 0; i < bins.length; i++) {
          var val = bins[i].value * range;
          // Add subtle animation
          val += Math.sin(time * 3 + i * 0.3) * 0.05 * smooth;
          val = Math.max(0, Math.min(1, val));

          var barH = val * maxH;
          var x = 30 + i * barW;
          var y = h - 30 - barH;

          var grad = ctx.createLinearGradient(x, y, x, h - 30);
          grad.addColorStop(0, 'rgba(232,150,46,0.85)');
          grad.addColorStop(1, 'rgba(232,150,46,0.1)');

          ctx.fillStyle = grad;
          ctx.fillRect(x + 1, y, barW - 2, barH);

          // Every 5th label
          if (i % 5 === 0) {
            ctx.fillStyle = '#5C5650';
            ctx.font = '9px "JetBrains Mono", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(bins[i].label, x + barW / 2, h - 12);
          }
        }

        // Baseline
        ctx.strokeStyle = '#2A2622';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(30, h - 30);
        ctx.lineTo(w - 30, h - 30);
        ctx.stroke();

        requestAnimationFrame(drawSpectrum);
      }

      rangeSlider.addEventListener('input', function() {});
      smoothSlider.addEventListener('input', function() {});
      drawSpectrum();
    })();

    // ── Waveform ──
    (function() {
      var canvas = document.getElementById('waveformCanvas');
      var ctx = canvas.getContext('2d');
      var speedSlider = document.getElementById('speedSlider');
      var phase = [0, Math.PI / 3, Math.PI * 0.7, Math.PI * 1.3];
      var freqs = [1, 2.3, 4.1, 7.8];
      var amps = [0.6, 0.35, 0.5, 0.25];

      function drawWaveform() {
        var w = canvas.width;
        var h = canvas.height;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.clearRect(0, 0, w, h);

        var speed = parseInt(speedSlider.value) * 0.01;
        var midY = h / 2;
        var amp = (h - 60) / 2;

        var colors = [
          [232, 150, 46],    // accent
          [158, 152, 144],   // secondary
          [92, 86, 80],      // muted
          [62, 58, 54]       // very muted
        ];

        // Grid lines
        ctx.strokeStyle = '#2A2622';
        ctx.lineWidth = 0.5;
        for (var gy = 30; gy < h - 30; gy += 40) {
          ctx.beginPath();
          ctx.moveTo(0, gy);
          ctx.lineTo(w, gy);
          ctx.stroke();
        }

        // Draw each waveform
        for (var ch = 0; ch < 4; ch++) {
          ctx.strokeStyle = 'rgba(' + colors[ch][0] + ',' + colors[ch][1] + ',' + colors[ch][2] + ',' + (0.9 - ch * 0.2) + ')';
          ctx.lineWidth = ch === 0 ? 2 : 1.2;
          ctx.beginPath();

          for (var x = 0; x < w; x++) {
            var t = x / w;
            var y = midY + Math.sin(t * freqs[ch] * Math.PI * 4 + phase[ch]) * amps[ch] * amp;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
          phase[ch] += speed * freqs[ch] * 0.3;
        }

        requestAnimationFrame(drawWaveform);
      }

      drawWaveform();
    })();

    // ── Signal Graph (D3) ──
    (function() {
      var svg = d3.select('#graphSvg');
      var width = 1100, height = 400;
      var tooltip = d3.select('#graphTooltip');

      var nodes = [
        { id: 'osc-a', label: 'Oscillator A', group: 'source', freq: '440Hz' },
        { id: 'osc-b', label: 'Oscillator B', group: 'source', freq: '220Hz' },
        { id: 'mic', label: 'Mic Input', group: 'source', freq: 'live' },
        { id: 'filter', label: 'Bandpass', group: 'process', freq: '800Hz Q:4' },
        { id: 'delay', label: 'Delay Line', group: 'process', freq: '3/16 note' },
        { id: 'shader', label: 'Frag Shader', group: 'process', freq: '60fps' },
        { id: 'envelope', label: 'Envelope', group: 'process', freq: 'AR 12ms' },
        { id: 'vertex', label: 'Vertex Out', group: 'output', freq: '1920×1080' },
        { id: 'audio-out', label: 'Audio Out', group: 'output', freq: '48kHz' },
        { id: 'midi', label: 'MIDI Out', group: 'output', freq: 'CH 1-16' }
      ];

      var links = [
        { source: 'osc-a', target: 'filter', type: 'audio' },
        { source: 'osc-b', target: 'filter', type: 'audio' },
        { source: 'mic', target: 'envelope', type: 'audio' },
        { source: 'filter', target: 'delay', type: 'audio' },
        { source: 'delay', target: 'audio-out', type: 'audio' },
        { source: 'envelope', target: 'shader', type: 'control' },
        { source: 'osc-a', target: 'shader', type: 'control' },
        { source: 'shader', target: 'vertex', type: 'video' },
        { source: 'filter', target: 'midi', type: 'control' },
        { source: 'envelope', target: 'audio-out', type: 'audio' }
      ];

      var colorMap = {
        source: '#E8962E',
        process: '#9E9890',
        output: '#5C5650'
      };

      var simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(120))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collide', d3.forceCollide(30));

      var link = svg.append('g')
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('class', 'link');

      var node = svg.append('g')
        .selectAll('.node')
        .data(nodes)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
          .on('start', function(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          })
          .on('drag', function(event, d) {
            d.fx = event.x;
            d.fy = event.y;
          })
          .on('end', function(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          })
        );

      node.append('circle')
        .attr('r', function(d) { return d.group === 'source' ? 7 : d.group === 'process' ? 6 : 5; })
        .attr('fill', function(d) { return colorMap[d.group]; })
        .on('mouseenter', function(event, d) {
          tooltip.style('display', 'block')
            .html('<strong>' + d.label + '</strong><br>' +
              (d.freq ? 'Freq/rate: ' + d.freq + '<br>' : '') +
              'Type: ' + d.group)
            .style('left', (event.pageX + 12) + 'px')
            .style('top', (event.pageY - 40) + 'px');

          // Highlight connected links
          link.classed('active', function(l) {
            return l.source.id === d.id || l.target.id === d.id;
          });
        })
        .on('mouseleave', function() {
          tooltip.style('display', 'none');
          link.classed('active', false);
        })
        .on('click', function(event, d) {
          // Animate the node briefly on click
          d3.select(this)
            .transition().duration(200)
            .attr('r', function(d) { return (d.group === 'source' ? 7 : d.group === 'process' ? 6 : 5) + 3; })
            .transition().duration(300)
            .attr('r', function(d) { return d.group === 'source' ? 7 : d.group === 'process' ? 6 : 5); });
        });

      node.append('text')
        .attr('dx', 12)
        .attr('dy', '.35em')
        .text(function(d) { return d.label; });

      simulation.on('tick', function() {
        link
          .attr('x1', function(d) { return d.source.x; })
          .attr('y1', function(d) { return d.source.y; })
          .attr('x2', function(d) { return d.target.x; })
          .attr('y2', function(d) { return d.target.y; });

        node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
      });
    })();
  </script>
</body>
</html>
