<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA — Intro</title>
  <!-- 6.3 Wildcard: A 3–5 second cinematic brand intro sequence.
       Chosen because it demonstrates VEKTRA's commitment to precise motion and time-as-aesthetic.
       The intro should feel like a system initializing — each frame earned, nothing decorative. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0C0B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
    }

    .intro {
      position: relative;
      width: 100%;
      max-width: 600px;
      text-align: center;
      opacity: 0;
      animation: introFadeIn 0.5s 0.05s forwards;
    }

    @keyframes introFadeIn {
      to { opacity: 1; }
    }

    /* Signal trace lines */
    .trace {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: #E8962E;
      opacity: 0;
    }

    .trace-top {
      top: 80px;
      animation: traceAnimate 0.8s 0.5s forwards;
      opacity: 0;
    }

    .trace-bottom {
      top: auto;
      bottom: 80px;
      animation: traceAnimate 0.8s 0.6s forwards;
      opacity: 0;
    }

    @keyframes traceAnimate {
      0% { width: 2px; opacity: 0; }
      10% { opacity: 0.6; }
      100% { width: 200px; opacity: 0; }
    }

    /* Vertex pulse */
    .vertex {
      width: 8px;
      height: 8px;
      background: #E8962E;
      border-radius: 50%;
      margin: 120px auto 40px;
      opacity: 0;
      animation: vertexPulse 0.6s 0.2s forwards;
    }

    @keyframes vertexPulse {
      0% { transform: scale(0); opacity: 0; }
      40% { transform: scale(3); opacity: 1; }
      60% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Logotype reveal — staggered per letter */
    .logotype {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 40px;
    }

    .logotype span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      color: #E8E4E0;
      opacity: 0;
      animation: letterReveal 0.12s forwards;
    }

    .logotype span:nth-child(1) { animation-delay: 1.2s; }
    .logotype span:nth-child(2) { animation-delay: 1.25s; }
    .logotype span:nth-child(3) { animation-delay: 1.30s; }
    .logotype span:nth-child(4) { animation-delay: 1.35s; }
    .logotype span:nth-child(5) { animation-delay: 1.40s; }
    .logotype span:nth-child(6) { animation-delay: 1.45s; }

    @keyframes letterReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Statement */
    .statement {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      font-size: 1.25rem;
      color: #9E9890;
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.6;
      opacity: 0;
      animation: statementIn 0.6s 2.0s forwards;
    }

    @keyframes statementIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CTA */
    .cta {
      display: inline-block;
      padding: 12px 28px;
      background: #E8962E;
      color: #0D0C0B;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 4px;
      opacity: 0;
      animation: ctaIn 0.4s 2.6s forwards;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .cta:hover {
      background: #5C3A10;
      color: #E8E4E0;
    }

    @keyframes ctaIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Skip button */
    .skip {
      position: fixed;
      bottom: 32px;
      right: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6875rem;
      color: #5C5650;
      cursor: pointer;
      border: 1px solid #2A2622;
      background: transparent;
      padding: 6px 12px;
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }

    .skip:hover {
      color: #E8E4E0;
      border-color: #E8962E;
    }

    /* Final state — everything visible */
    .end-state .statement,
    .end-state .cta,
    .end-state .logotype span {
      animation: none;
      opacity: 1;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="intro" id="intro">
    <div class="trace trace-top"></div>
    <div class="vertex"></div>
    <div class="trace trace-bottom"></div>
    <div class="logotype">
      <span>V</span><span>E</span><span>K</span><span>T</span><span>R</span><span>A</span>
    </div>
    <p class="statement">
      The space between a frequency and a gesture is smaller than you think.
    </p>
    <a href="#" class="cta">Enter VEKTRA</a>
  </div>

  <button class="skip" id="skipBtn">Skip</button>

  <script>
    var intro = document.getElementById('intro');
    var skipBtn = document.getElementById('skipBtn');

    function finishIntro() {
      intro.classList.add('end-state');
    }

    // Auto-complete after 3.4 seconds (slightly after all animations end at ~3.0s)
    var autoFinish = setTimeout(finishIntro, 3400);

    skipBtn.addEventListener('click', function() {
      clearTimeout(autoFinish);
      finishIntro();
    });
  </script>
</body>
</html>
