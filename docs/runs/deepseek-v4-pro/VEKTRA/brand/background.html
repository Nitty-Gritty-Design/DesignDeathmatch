<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA — Generative Signal Field</title>
  <!-- 6.1 Wildcard: A standalone full-viewport Canvas animation.
       Chosen because the generative background is the primary motion statement of VEKTRA's identity —
       it demonstrates code-as-design and signals-as-feel, and it must work on its own before it works behind content.
       This is the canvas behind the hero — it should be beautiful alone and subtle behind content. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0C0B;
      overflow: hidden;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .overlay-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 700;
      color: rgba(232, 228, 224, 0.9);
      text-align: center;
      letter-spacing: -0.03em;
      line-height: 1.05;
      pointer-events: none;
      user-select: none;
    }

    .info {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6875rem;
      color: rgba(158, 152, 144, 0.6);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="overlay">
    <div class="overlay-text">The signal<br>is the field</div>
  </div>
  <div class="info" id="fps">move your cursor</div>

  <script>
    (function() {
      var canvas = document.getElementById('bg');
      var ctx = canvas.getContext('2d');
      var fpsEl = document.getElementById('fps');

      var width, height;
      var particles = [];
      var particleCount = 120;
      var mouseX = -1000;
      var mouseY = -1000;
      var targetMouseX = -1000;
      var targetMouseY = -1000;
      var time = 0;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * window.devicePixelRatio;
        canvas.height = height * window.devicePixelRatio;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      function createParticles() {
        particles = [];
        for (var i = 0; i < particleCount; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: 0,
            vy: 0,
            baseX: Math.random() * width,
            baseY: Math.random() * height,
            radius: Math.random() * 2 + 0.8,
            phase: Math.random() * Math.PI * 2,
            freq: Math.random() * 0.008 + 0.002,
            amplitude: Math.random() * 30 + 10
          });
        }
      }

      var frames = 0;
      var lastFpsTime = performance.now();

      function draw() {
        ctx.clearRect(0, 0, width, height);

        // Smooth mouse interpolation (like a spring)
        mouseX += (targetMouseX - mouseX) * 0.05;
        mouseY += (targetMouseY - mouseY) * 0.05;
        time += 0.016;

        // Draw connections between nearby particles
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var maxDist = 150;

            if (dist < maxDist) {
              var alpha = (1 - dist / maxDist) * (1 - dist / maxDist) * 0.18;
              ctx.strokeStyle = 'rgba(232, 150, 46,' + alpha + ')';
              ctx.lineWidth = 0.6;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        // Update and draw particles
        for (var k = 0; k < particles.length; k++) {
          var p = particles[k];

          // Oscillate around base position
          var targetX = p.baseX + Math.sin(time * p.freq + p.phase) * p.amplitude;
          var targetY = p.baseY + Math.cos(time * p.freq * 0.7 + p.phase) * p.amplitude * 0.6;

          // Mouse influence — particles are attracted to the cursor
          var mdx = targetMouseX - p.x;
          var mdy = targetMouseY - p.y;
          var mdist = Math.sqrt(mdx * mdx + mdy * mdy);

          if (mdist < 250) {
            var force = (1 - mdist / 250);
            force = force * force * 0.8;
            targetX = p.x + (mdx / mdist) * force * 80;
            targetY = p.y + (mdy / mdist) * force * 80;
          }

          // Spring toward target
          p.vx += (targetX - p.x) * 0.03;
          p.vy += (targetY - p.y) * 0.03;
          p.vx *= 0.92;
          p.vy *= 0.92;
          p.x += p.vx;
          p.y += p.vy;

          // Wrap around
          if (p.x < -40) p.x = width + 40;
          if (p.x > width + 40) p.x = -40;
          if (p.y < -40) p.y = height + 40;
          if (p.y > height + 40) p.y = -40;

          // Draw particle
          ctx.fillStyle = 'rgba(232, 150, 46, 0.5)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Mouse glow
        if (targetMouseX > 0) {
          var glow = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
          glow.addColorStop(0, 'rgba(232, 150, 46, 0.08)');
          glow.addColorStop(0.5, 'rgba(232, 150, 46, 0.03)');
          glow.addColorStop(1, 'rgba(232, 150, 46, 0)');
          ctx.fillStyle = glow;
          ctx.fillRect(mouseX - 200, mouseY - 200, 400, 400);
        }

        // FPS counter
        frames++;
        var now = performance.now();
        if (now - lastFpsTime >= 1000) {
          fpsEl.textContent = (frames / ((now - lastFpsTime) / 1000)).toFixed(0) + ' fps — move your cursor';
          frames = 0;
          lastFpsTime = now;
        }

        requestAnimationFrame(draw);
      }

      resize();
      createParticles();
      draw();

      window.addEventListener('resize', function() {
        resize();
        createParticles();
      });

      document.addEventListener('mousemove', function(e) {
        targetMouseX = e.clientX;
        targetMouseY = e.clientY;
      });

      document.addEventListener('touchmove', function(e) {
        targetMouseX = e.touches[0].clientX;
        targetMouseY = e.touches[0].clientY;
      });
    })();
  </script>
</body>
</html>
