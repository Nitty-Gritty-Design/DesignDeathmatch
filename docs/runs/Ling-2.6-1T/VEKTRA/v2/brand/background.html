<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTRA — Generative Signal Field</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #080809;
      overflow: hidden;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .info {
      position: fixed;
      bottom: 24px;
      left: 24px;
      color: rgba(242, 242, 240, 0.3);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }
    
    .title {
      position: fixed;
      top: 24px;
      left: 24px;
      color: rgba(242, 242, 240, 0.6);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 10;
    }
    
    .fps {
      position: fixed;
      top: 24px;
      right: 24px;
      color: rgba(232, 77, 27, 0.4);
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="title">Signal Field v2</div>
  <div class="info">Interactive particle system — move cursor to influence field</div>
  <div class="fps" id="fps">FPS: --</div>
  
  <script>
    // Premium Generative Background
    // VEKTRA v2 — Signal Field with advanced particle interactions
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fpsEl = document.getElementById('fps');
    
    // Brand token values
    const COLOR_BG = '#080809';
    const COLOR_ACCENT = '#e84d1b';
    const COLOR_ACCENT_BRIGHT = '#ff6a2a';
    const COLOR_SURFACE = '#121214';
    
    let width = 0;
    let height = 0;
    let particles = [];
    let connections = [];
    let mouseX = 0;
    let mouseY = 0;
    let targetMouseX = 0;
    let targetMouseY = 0;
    let time = 0;
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let currentFps = 60;
    
    const PARTICLE_COUNT = 100;
    const MAX_DISTANCE = 140;
    const MOUSE_INFLUENCE_RADIUS = 200;
    
    // Performance-optimized particle class
    class Particle {
      constructor() {
        this.reset();
        this.x = Math.random() * width;
        this.y = Math.random() * height;
      }
      
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.max(0.5, 1 + Math.random() * 2);
        this.baseRadius = this.radius;
        this.phase = Math.random() * Math.PI * 2;
        this.frequency = 0.3 + Math.random() * 1.2;
        this.hue = 15 + Math.random() * 25;
        this.alpha = 0.3 + Math.random() * 0.4;
        this.pulseSpeed = 0.5 + Math.random() * 1.5;
      }
      
      update(dt) {
        // Wave motion
        this.phase += 0.02 * this.frequency;
        const waveForce = Math.sin(this.phase) * 0.15;
        
        // Mouse influence
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        let influence = 0;
        
        if (dist < MOUSE_INFLUENCE_RADIUS && dist > 0) {
          influence = (1 - dist / MOUSE_INFLUENCE_RADIUS) * 0.6;
          const force = influence * 0.2;
          this.vx += (dx / dist) * force;
          this.vy += (dy / dist) * force;
        }
        
        // Apply wave force
        this.vx += Math.cos(this.phase * 0.7) * 0.02;
        this.vy += Math.sin(this.phase * 0.5) * 0.02;
        this.vx += waveForce * 0.1;
        
        // Damping
        this.vx *= 0.97;
        this.vy *= 0.97;
        
        // Update position
        this.x += this.vx;
        this.y += this.vy;
        
        // Boundary wrap with smooth transition
        const margin = 50;
        if (this.x < -margin) this.x = width + margin;
        if (this.x > width + margin) this.x = -margin;
        if (this.y < -margin) this.y = height + margin;
        if (this.y > height + margin) this.y = -margin;
        
        // Pulse radius based on influence and wave
        const pulse = Math.sin(time * this.pulseSpeed + this.phase) * 0.3 + 1;
        this.radius = this.baseRadius * (1 + influence * 0.5) * pulse;
      }
      
      draw(ctx) {
        const glowIntensity = this.radius > this.baseRadius * 1.2 ? 0.3 : 0;
        
        // Main particle
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.5, this.radius), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 90%, 60%, ${this.alpha})`;
        ctx.fill();
        
        // Glow for larger particles
        if (this.radius > this.baseRadius * 1.3) {
          const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.radius * 2
          );
          gradient.addColorStop(0, `hsla(${this.hue}, 90%, 60%, ${this.alpha * 0.3})`);
          gradient.addColorStop(1, `hsla(${this.hue}, 90%, 60%, 0)`);
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();
        }
      }
    }
    
    function init() {
      width = window.innerWidth;
      height = window.innerHeight;
      
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }
    }
    
    function drawGrid() {
      const gridSize = 50;
      ctx.strokeStyle = 'rgba(232, 77, 27, 0.02)';
      ctx.lineWidth = 0.5;
      
      for (let x = 0; x < width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      
      for (let y = 0; y < height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
    }
    
    function drawConnections() {
      ctx.strokeStyle = 'rgba(232, 77, 27, 0.06)';
      ctx.lineWidth = 0.5;
      
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < MAX_DISTANCE) {
            const alpha = (1 - dist / MAX_DISTANCE) * 0.4;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
    }
    
    function drawSignalWave() {
      const centerY = height * 0.75;
      const amplitude = 40 + Math.sin(time * 0.3) * 20;
      const frequency = 0.02 + Math.sin(time * 0.1) * 0.005;
      
      ctx.strokeStyle = `rgba(232, 77, 27, ${0.15 + Math.sin(time * 0.5) * 0.1})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      
      for (let x = 0; x < width; x += 2) {
        let y = centerY;
        // Multiple wave layers
        y += Math.sin(x * frequency + time * 1.5) * amplitude;
        y += Math.sin(x * frequency * 2.3 + time * 0.8) * amplitude * 0.5;
        y += Math.sin(x * frequency * 0.7 + time * 2) * amplitude * 0.3;
        
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    
    function drawMouseInfluence() {
      if (mouseX < 0 || mouseY < 0) return;
      
      const gradient = ctx.createRadialGradient(
        mouseX, mouseY, 0,
        mouseX, mouseY, MOUSE_INFLUENCE_RADIUS
      );
      gradient.addColorStop(0, 'rgba(232, 77, 27, 0.08)');
      gradient.addColorStop(0.5, 'rgba(232, 77, 27, 0.02)');
      gradient.addColorStop(1, 'rgba(232, 77, 27, 0)');
      
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, MOUSE_INFLUENCE_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Ring indicator
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 30 + Math.sin(time * 3) * 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(232, 77, 27, 0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    
    function animate() {
      time += 0.016;
      
      // Smooth mouse interpolation
      mouseX += (targetMouseX - mouseX) * 0.08;
      mouseY += (targetMouseY - mouseY) * 0.08;
      
      // Clear with subtle trail effect
      ctx.fillStyle = 'rgba(8, 8, 9, 0.12)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw layers
      drawGrid();
      drawMouseInfluence();
      drawConnections();
      drawSignalWave();
      
      // Update and draw particles
      particles.forEach(p => {
        p.update();
        p.draw(ctx);
      });
      
      // FPS counter
      frameCount++;
      const now = performance.now();
      if (now >= lastFpsTime + 1000) {
        currentFps = Math.round((frameCount * 1000) / (now - lastFpsTime));
        fpsEl.textContent = `FPS: ${currentFps}`;
        frameCount = 0;
        lastFpsTime = now;
      }
      
      requestAnimationFrame(animate);
    }
    
    // Event handlers
    function handleMouseMove(e) {
      targetMouseX = e.clientX;
      targetMouseY = e.clientY;
    }
    
    function handleTouchMove(e) {
      if (e.touches.length > 0) {
        targetMouseX = e.touches[0].clientX;
        targetMouseY = e.touches[0].clientY;
      }
    }
    
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
    canvas.addEventListener('mouseleave', () => {
      targetMouseX = width / 2;
      targetMouseY = height / 2;
    });
    
    window.addEventListener('resize', init);
    
    // Initialize
    targetMouseX = width / 2;
    targetMouseY = height / 2;
    init();
    animate();
    
    // Reduced motion
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      particles.forEach(p => {
        p.vx *= 0.1;
        p.vy *= 0.1;
      });
    }
  </script>
</body>
</html>
