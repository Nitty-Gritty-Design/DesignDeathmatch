<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VEKTRA — Signal Field</title>
<!--
  Wildcard 6.1 — Generative animated background
  Rationale: Chosen because VEKTRA's product IS a signal graph. This canvas
  renders a living field of oscillating nodes and edges that respond to cursor
  position — demonstrating the brand's core concept in the brand identity itself.
  Vanilla JS Canvas API — no libraries needed for 2D particle field.
-->
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0C0C0E}
canvas{display:block;width:100%;height:100%}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(232,255,71,0.35);pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">move cursor to interact · signal field active</div>
<script>
// VEKTRA Generative Background
// Signal field: nodes oscillate on the canvas, connected by edges when close.
// Mouse position warps the field toward the cursor.
// Performance target: 60fps via requestAnimationFrame.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const ACCENT = [232, 255, 71];
const BG = '#0C0C0E';

let W, H, nodes = [], frame = 0;
const N = 120; // node count — tuned for 60fps on mid-range hardware

const mouse = { x: -1, y: -1 };
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
document.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: true });

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); buildNodes(); });

function buildNodes() {
  nodes = [];
  for (let i = 0; i < N; i++) {
    nodes.push({
      ox: Math.random() * W,
      oy: Math.random() * H,
      x: 0, y: 0,
      phase: Math.random() * Math.PI * 2,
      freq: 0.003 + Math.random() * 0.006,
      rx: 30 + Math.random() * 50,
      ry: 20 + Math.random() * 40,
      size: 0.8 + Math.random() * 1.8,
      alpha: 0.06 + Math.random() * 0.18,
    });
  }
}
buildNodes();

const MAX_DIST = 140;
const MOUSE_RADIUS = 220;
const MOUSE_FORCE  = 0.022;

function tick() {
  ctx.clearRect(0, 0, W, H);
  frame++;

  const mx = mouse.x < 0 ? W / 2 : mouse.x;
  const my = mouse.y < 0 ? H / 2 : mouse.y;

  // Update positions
  for (let i = 0; i < N; i++) {
    const n = nodes[i];
    n.x = n.ox + Math.sin(frame * n.freq + n.phase) * n.rx;
    n.y = n.oy + Math.cos(frame * n.freq * 0.73 + n.phase) * n.ry;

    // Mouse warp
    const ddx = mx - n.x, ddy = my - n.y;
    const d = Math.sqrt(ddx * ddx + ddy * ddy);
    if (d < MOUSE_RADIUS) {
      const f = (1 - d / MOUSE_RADIUS) * MOUSE_FORCE;
      n.ox += ddx * f;
      n.oy += ddy * f;
    }
    // Drift back
    n.ox += (W * (n.ox < 0 ? 0.1 : n.ox > W ? 0.9 : n.ox / W) - n.ox) * 0.0005;
    n.oy += (H * (n.oy < 0 ? 0.1 : n.oy > H ? 0.9 : n.oy / H) - n.oy) * 0.0005;
  }

  // Draw edges
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = dx * dx + dy * dy;
      if (d < MAX_DIST * MAX_DIST) {
        const t = 1 - Math.sqrt(d) / MAX_DIST;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(${ACCENT[0]},${ACCENT[1]},${ACCENT[2]},${t * 0.13})`;
        ctx.lineWidth = t * 0.8;
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  for (let i = 0; i < N; i++) {
    const n = nodes[i];
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${ACCENT[0]},${ACCENT[1]},${ACCENT[2]},${n.alpha})`;
    ctx.fill();
  }

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
