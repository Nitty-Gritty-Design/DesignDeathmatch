<!DOCTYPE html>
<html>
<head>
  <title>VEKTRA v2 Logo Animated</title>
  <style>
    body { background: #08080d; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .logo-container { position: relative; width: 280px; height: 40px; }
    .cursor {
      position: absolute; left: 178px; top: 8px; /* Next to logotype */
      width: 2px; height: 28px; background: #f2f2f7;
      animation: cursorBlink 1s infinite 3s;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" width="280" height="40" viewBox="0 0 280 40">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');
          /* Init Pulse */
          @keyframes initPulse {
            0% { opacity: 0; filter: drop-shadow(0 0 0px #00ecff); }
            50% { opacity: 1; filter: drop-shadow(0 0 20px #00ecff); }
            100% { opacity: 0.3; filter: drop-shadow(0 0 8px #00ecff); }
          }
          /* Mark Draw */
          @keyframes drawMark {
            to { stroke-dashoffset: 0; }
          }
          /* Logotype Fade-in */
          @keyframes fadeIn {
            from { opacity: 0; transform: translateX(4px); }
            to { opacity: 1; transform: translateX(0); }
          }
          /* Final Glow */
          @keyframes finalGlow {
            0% { filter: drop-shadow(0 0 0px #00ecff); }
            50% { filter: drop-shadow(0 0 12px #00ecff); }
            100% { filter: drop-shadow(0 0 4px #00ecff); }
          }
          .mark-stroke {
            fill: none; stroke: #00ecff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 120; stroke-dashoffset: 120;
            animation: initPulse 0.4s ease-out forwards, drawMark 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards, finalGlow 0.2s ease-out 3s forwards;
          }
          .node { fill: #00ecff; opacity: 0; animation: initPulse 0.4s ease-out forwards; }
          .logotype {
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 32px; fill: #f2f2f7; letter-spacing: -0.03em;
            opacity: 0; animation: fadeIn 0.8s ease-out 2.2s forwards;
          }
        </style>
      </defs>
      <!-- Mark -->
      <path class="mark-stroke" d="M4,20 C8,12 8,28 12,20 C16,12 16,28 20,20 C24,12 24,28 28,20 C32,12 32,28 36,20 L36,8 L4,20 Z" />
      <circle class="node" cx="20" cy="20" r="2" />
      <!-- Logotype -->
      <text x="64" y="32" class="logotype">VEKTRA</text>
    </svg>
    <div class="cursor"></div>
  </div>
</body>
</html>
