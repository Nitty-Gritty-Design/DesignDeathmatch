<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- VEKTRA Parametric Mark V2 -->
  <g id="mark-v2">
    <!-- The outer boundary / environment -->
    <rect x="2" y="10" width="40" height="40" stroke="#FF3300" stroke-width="1" stroke-dasharray="1 3"/>
    
    <!-- The Signal V: A series of vertical vectors forming a V-shape -->
    <!-- Left Wing -->
    <rect x="8" y="16" width="1.5" height="12" fill="#FF3300" opacity="0.4"/>
    <rect x="12" y="20" width="1.5" height="16" fill="#FF3300" opacity="0.6"/>
    <rect x="16" y="24" width="1.5" height="20" fill="#FF3300" opacity="0.8"/>
    
    <!-- Core / Vertex -->
    <rect x="21.25" y="28" width="1.5" height="24" fill="#FF3300"/>
    
    <!-- Right Wing -->
    <rect x="26.5" y="24" width="1.5" height="20" fill="#FF3300" opacity="0.8"/>
    <rect x="30.5" y="20" width="1.5" height="16" fill="#FF3300" opacity="0.6"/>
    <rect x="34.5" y="16" width="1.5" height="12" fill="#FF3300" opacity="0.4"/>
  </g>
  
  <!-- VEKTRA Logotype V2 -->
  <text x="58" y="42" fill="#FFFFFF" style="font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 28px; letter-spacing: 0.25em;">VEKTRA</text>
  
  <!-- Technical Metadata Decor -->
  <text x="58" y="52" fill="#444444" style="font-family: 'IBM Plex Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 0.1em;">SIGNAL_GRAPH_ENV // BUILD_V2.0.0</text>
</svg>
