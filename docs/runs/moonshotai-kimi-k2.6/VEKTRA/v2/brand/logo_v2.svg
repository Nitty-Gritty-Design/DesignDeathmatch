<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <title>VEKTRA Logo v2</title>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Mark -->
  <g fill="none" stroke="#F2F0EC" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Center signal line -->
    <line x1="10" y1="36" x2="54" y2="36"/>
    <!-- Left arm: stepped V -->
    <polyline points="32,2 26,16 18,32 10,48 6,60"/>
    <!-- Right arm: stepped V -->
    <polyline points="32,2 38,16 46,32 54,48 58,60"/>
  </g>
  <!-- Logotype -->
  <text x="82" y="48" fill="#F2F0EC" font-family="'IBM Plex Mono', monospace" font-size="34" font-weight="700" letter-spacing="-0.06em">VEKTRA</text>
</svg>
