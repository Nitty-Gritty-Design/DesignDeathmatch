<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEKTRA Logo — Animated v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060A09;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .logo-stage {
    width: 320px;
    height: 72px;
    position: relative;
  }
  svg {
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* --- Center line draw --- */
  .center-line {
    stroke-dasharray: 44;
    stroke-dashoffset: 44;
    animation: drawLine 700ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* --- Glow particle traveling along center line --- */
  .glow-particle {
    opacity: 0;
    animation: particleMove 700ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* --- Left arm segments with stagger --- */
  .left-seg {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    transform-origin: 32px 2px;
    animation: segReveal 500ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .l1 { animation-delay: 800ms; }
  .l2 { animation-delay: 920ms; }
  .l3 { animation-delay: 1040ms; }
  .l4 { animation-delay: 1160ms; }

  /* --- Right arm segments with stagger --- */
  .right-seg {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    transform-origin: 32px 2px;
    animation: segReveal 500ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .r1 { animation-delay: 1400ms; }
  .r2 { animation-delay: 1520ms; }
  .r3 { animation-delay: 1640ms; }
  .r4 { animation-delay: 1760ms; }

  /* --- Lock pulse --- */
  .mark-stroke {
    animation: lockPulse 400ms ease-out forwards;
    animation-delay: 2400ms;
  }

  /* --- Logotype letter reveal --- */
  .letter-wrap {
    display: inline-block;
    overflow: hidden;
    vertical-align: bottom;
  }
  .letter-wrap span {
    display: inline-block;
    transform: translateY(120%);
    animation: rise 500ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .lv1 span { animation-delay: 2600ms; }
  .lv2 span { animation-delay: 2720ms; }
  .lv3 span { animation-delay: 2840ms; }
  .lv4 span { animation-delay: 2960ms; }
  .lv5 span { animation-delay: 3080ms; }
  .lv6 span { animation-delay: 3200ms; }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }
  @keyframes particleMove {
    0% { opacity: 1; offset-distance: 0%; }
    80% { opacity: 1; }
    100% { opacity: 0; offset-distance: 100%; }
  }
  @keyframes segReveal {
    0% { stroke-dashoffset: 60; transform: scaleY(1.08); }
    60% { transform: scaleY(1.0); }
    100% { stroke-dashoffset: 0; transform: scaleY(1.0); }
  }
  @keyframes lockPulse {
    0% { filter: none; }
    50% { filter: drop-shadow(0 0 6px rgba(0,229,191,0.6)); }
    100% { filter: none; }
  }
  @keyframes rise {
    to { transform: translateY(0); }
  }

  /* Reduced motion fallback */
  @media (prefers-reduced-motion: reduce) {
    .center-line, .left-seg, .right-seg { stroke-dashoffset: 0; animation: none; }
    .glow-particle { opacity: 0; animation: none; }
    .letter-wrap span { transform: translateY(0); animation: none; }
  }
</style>
</head>
<body>
  <div class="logo-stage">
    <svg viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Mark group -->
      <g fill="none" stroke="#F2F0EC" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <!-- Center line -->
        <line class="center-line mark-stroke" x1="10" y1="36" x2="54" y2="36"/>

        <!-- Glow particle on center line -->
        <circle class="glow-particle" r="3" fill="#00E5BF" filter="url(#glow)" opacity="0">
          <animateMotion dur="700ms" begin="0ms" fill="freeze" path="M10,36 L54,36"/>
        </circle>

        <!-- Left arm segments -->
        <line class="left-seg l1 mark-stroke" x1="32" y1="2" x2="26" y2="16"/>
        <line class="left-seg l2 mark-stroke" x1="26" y1="16" x2="18" y2="32"/>
        <line class="left-seg l3 mark-stroke" x1="18" y1="32" x2="10" y2="48"/>
        <line class="left-seg l4 mark-stroke" x1="10" y1="48" x2="6" y2="60"/>

        <!-- Right arm segments -->
        <line class="right-seg r1 mark-stroke" x1="32" y1="2" x2="38" y2="16"/>
        <line class="right-seg r2 mark-stroke" x1="38" y1="16" x2="46" y2="32"/>
        <line class="right-seg r3 mark-stroke" x1="46" y1="32" x2="54" y2="48"/>
        <line class="right-seg r4 mark-stroke" x1="54" y1="48" x2="58" y2="60"/>
      </g>

      <!-- Logotype via foreignObject for precise typography animation -->
      <foreignObject x="82" y="18" width="240" height="46">
        <div xmlns="http://www.w3.org/1999/xhtml"
             style="font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:700;letter-spacing:-0.06em;color:#F2F0EC;line-height:1;">
          <span class="letter-wrap lv1"><span>V</span></span><span class="letter-wrap lv2"><span>E</span></span><span class="letter-wrap lv3"><span>K</span></span><span class="letter-wrap lv4"><span>T</span></span><span class="letter-wrap lv5"><span>R</span></span><span class="letter-wrap lv6"><span>A</span></span>
        </div>
      </foreignObject>
    </svg>
  </div>
</body>
</html>
