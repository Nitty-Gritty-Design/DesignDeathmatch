<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEKTRA — The Signal Field</title>
<!-- Wildcard 6.1: Generative animated background.
     A full-viewport Canvas signal field. Vanilla JS Canvas API.
     Responds to mouse position. 60fps via requestAnimationFrame.
     Uses brand tokens imported from tokens.css. -->
<link rel="stylesheet" href="tokens.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--color-bg-primary);
    font-family: var(--font-mono);
  }
  #signalCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    text-align: center;
    padding: 24px;
  }
  .overlay h1 {
    font-size: clamp(2.5rem, 8vw, 7rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--color-text-primary);
    opacity: 0.08;
    line-height: 0.95;
    user-select: none;
  }
  .overlay p {
    margin-top: 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-muted);
    opacity: 0.5;
    user-select: none;
  }
</style>
</head>
<body>
<canvas id="signalCanvas"></canvas>
<div class="overlay">
  <h1>VEKTRA</h1>
  <p>Move cursor to disturb the field</p>
</div>

<script>
(function() {
  const canvas = document.getElementById('signalCanvas');
  const ctx = canvas.getContext('2d');
  let width, height, dpr;
  const mouse = { x: -9999, y: -9999, vx: 0, vy: 0, px: -9999, py: -9999 };

  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  window.addEventListener('mousemove', (e) => {
    mouse.px = mouse.x;
    mouse.py = mouse.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (mouse.px !== -9999) {
      mouse.vx = mouse.x - mouse.px;
      mouse.vy = mouse.y - mouse.py;
    }
  });
  window.addEventListener('mouseleave', () => {
    mouse.x = -9999; mouse.y = -9999;
    mouse.vx = 0; mouse.vy = 0;
  });

  // Read brand tokens from CSS
  const styles = getComputedStyle(document.documentElement);
  const hexToRgb = (hex) => {
    const m = hex.replace('#','').match(/.{1,2}/g);
    return m ? { r: parseInt(m[0],16), g: parseInt(m[1],16), b: parseInt(m[2],16) } : {r:0,g:240,b:200};
  };
  const accentHex = (styles.getPropertyValue('--color-accent').trim() || '#00F0C8');
  const mutedHex = (styles.getPropertyValue('--color-text-muted').trim() || '#5A6461');
  const primaryHex = (styles.getPropertyValue('--color-text-primary').trim() || '#F4F2EE');
  const accent = hexToRgb(accentHex);
  const muted = hexToRgb(mutedHex);
  const primary = hexToRgb(primaryHex);

  // Signal field configuration
  const LAYERS = 5;
  const ROWS = 12;
  const COLS = 24;
  const waves = [];
  const points = [];

  for (let i = 0; i < LAYERS; i++) {
    waves.push({
      y: height * (0.2 + (i / (LAYERS - 1)) * 0.6),
      amp: 20 + i * 8,
      freq: 0.003 + i * 0.0015,
      speed: 0.001 + i * 0.0004,
      phase: i * 1.2,
      opacity: 0.15 + (LAYERS - i) * 0.05,
    });
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      points.push({
        baseX: (c + 0.5) * (width / COLS),
        baseY: (r + 0.5) * (height / ROWS),
        x: 0, y: 0,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.5,
        radius: 1 + Math.random() * 1.5,
      });
    }
  }

  function draw() {
    const bgHex = styles.getPropertyValue('--color-bg-primary').trim() || '#0A0E0D';
    ctx.fillStyle = bgHex;
    ctx.fillRect(0, 0, width, height);

    const time = performance.now();

    // Mouse influence decay
    mouse.vx *= 0.92;
    mouse.vy *= 0.92;

    const mouseActive = mouse.x > -1000;
    const mx = mouseActive ? mouse.x : width * 0.5;
    const my = mouseActive ? mouse.y : height * 0.5;

    // Draw oscillating grid points
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      const dx = p.baseX - mx;
      const dy = p.baseY - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const influence = mouseActive ? Math.max(0, 1 - dist / 300) : 0;

      p.x = p.baseX + Math.sin(time * 0.001 * p.speed + p.phase) * 4 * (1 + influence * 3);
      p.y = p.baseY + Math.cos(time * 0.001 * p.speed * 0.7 + p.phase) * 2 * (1 + influence * 3);

      const alpha = 0.2 + influence * 0.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * (1 + influence), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${muted.r},${muted.g},${muted.b},${alpha})`;
      ctx.fill();
    }

    // Draw connection web between nearby points
    ctx.lineWidth = 0.6;
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const dx = points[i].x - points[j].x;
        const dy = points[i].y - points[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 80) {
          const a = (1 - d / 80) * 0.12;
          ctx.beginPath();
          ctx.moveTo(points[i].x, points[i].y);
          ctx.lineTo(points[j].x, points[j].y);
          ctx.strokeStyle = `rgba(${accent.r},${accent.g},${accent.b},${a})`;
          ctx.stroke();
        }
      }
    }

    // Draw layered sine waves
    for (let i = 0; i < waves.length; i++) {
      const w = waves[i];
      const mouseOffset = mouseActive ? (mouse.y - height/2) * 0.1 * (i+1)/LAYERS : 0;
      const ampMod = mouseActive ? 1 + Math.abs(mouse.vy) * 0.02 : 1;

      ctx.beginPath();
      for (let x = 0; x <= width; x += 3) {
        const distToMouse = mouseActive ? Math.abs(x - mouse.x) : width;
        const localAmp = w.amp * ampMod * (1 + Math.max(0, 1 - distToMouse/400) * 0.5);
        const y = w.y + mouseOffset + Math.sin(x * w.freq + time * w.speed + w.phase) * localAmp * Math.sin((x/width) * Math.PI);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${accent.r},${accent.g},${accent.b},${w.opacity})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // Draw a central field cursor when mouse is active
    if (mouseActive) {
      ctx.beginPath();
      ctx.arc(mx, my, 40 + Math.sin(time * 0.003) * 10, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${accent.r},${accent.g},${accent.b},0.08)`;
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(mx, my, 4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${accent.r},${accent.g},${accent.b},0.5)`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
