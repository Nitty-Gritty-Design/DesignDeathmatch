<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Framework - DesignDeathmatch</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .framework-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 48px;
      margin: 48px 0;
    }
    .framework-nav {
      position: sticky;
      top: 48px;
      align-self: start;
    }
    .framework-nav ul {
      list-style: none;
    }
    .framework-nav li {
      margin-bottom: 12px;
    }
    .framework-nav a {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-family: var(--font-mono);
      transition: color 0.2s;
    }
    .framework-nav a:hover, .framework-nav a.active {
      color: var(--color-text-primary);
      font-weight: 600;
    }
    .markdown-body {
      background: var(--color-surface);
      padding: 48px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      line-height: 1.7;
      overflow-wrap: break-word;
      min-width: 0;
    }
    .markdown-body h1 { margin-bottom: 24px; border-bottom: 1px solid var(--color-border); padding-bottom: 12px; font-size: 2rem; }
    .markdown-body h2 { margin: 32px 0 16px; font-size: 1.5rem; }
    .markdown-body p { margin-bottom: 16px; }
    .markdown-body code { font-family: var(--font-mono); background: var(--color-bg-secondary); padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
    .markdown-body pre { background: var(--color-bg-secondary); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 24px; max-width: 100%; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 24px; display: block; overflow-x: auto; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--color-border); padding: 12px; text-align: left; min-width: 120px; }
    .markdown-body th { background: var(--color-bg-secondary); }

    @media (max-width: 1024px) {
      .framework-layout { gap: 24px; }
      .markdown-body { padding: 32px; }
    }

    @media (max-width: 768px) {
      .framework-layout { grid-template-columns: 1fr; gap: 24px; }
      .framework-nav { position: static; display: flex; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid var(--color-border); padding-bottom: 24px; margin-bottom: 24px; }
      .framework-nav li { margin-bottom: 0; }
      .markdown-body { padding: 24px; }
      .markdown-body h1 { font-size: 1.5rem; }
      .markdown-body h2 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px;">
        <div style="display: flex; align-items: center; gap: 24px;">
          <a href="../index.html" style="text-decoration: none;"><img src="../assets/DesignDeathmatch_Logo.png" alt="DesignDeathmatch Logo" class="logo-img" style="height: 40px; width: auto;"></a>
          <nav style="display: flex; gap: 24px;">
            <a href="../index.html" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px;">Gallery</a>
            <a href="../charts.html" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px;">Charts</a>
            <a href="index.html" style="color: var(--color-text-primary); text-decoration: none; font-family: var(--font-mono); font-size: 14px; font-weight: 600;">Framework</a>
            <a href="../scoring.html" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px;">Scoring</a>
          </nav>
        </div>
        <a href="https://github.com/Nitty-Gritty-Design/DesignDeathmatch" target="_blank" style="color: var(--color-text-secondary); text-decoration: none; font-family: var(--font-mono); font-size: 14px; display: flex; align-items: center; gap: 6px;">
          <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" style="opacity: 0.7;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
          GitHub
        </a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="framework-layout">
        <aside class="framework-nav">
          <ul id="nav-list">
            <li><a href="#README.md" class="active">Overview</a></li>
            <li><a href="#BRIEF.md">The Brief</a></li>
            <li><a href="#DESIGN.md">Design System</a></li>
            <li><a href="#TASKS.md">Tasks & Phases</a></li>
            <li><a href="#RULES.md">Rules</a></li>
            <li><a href="#SCORING.md">Scoring Rubric</a></li>
          </ul>
        </aside>
        <article class="markdown-body" id="content">
          Loading documentation...
        </article>
      </div>
    </div>
  </main>

  <script>
    const contentDiv = document.getElementById('content');
    const navLinks = document.querySelectorAll('.framework-nav a');

    async function loadMarkdown(filename) {
      try {
        const response = await fetch(filename);
        const text = await response.text();
        contentDiv.innerHTML = marked.parse(text);
        
        navLinks.forEach(link => {
          link.classList.remove('active');
          if (link.getAttribute('href') === '#' + filename) {
            link.classList.add('active');
          }
        });
      } catch (error) {
        contentDiv.innerHTML = '<p>Error loading document.</p>';
      }
    }

    window.addEventListener('hashchange', () => {
      const filename = window.location.hash.slice(1) || 'README.md';
      loadMarkdown(filename);
    });

    // Initial load
    const initialFile = window.location.hash.slice(1) || 'README.md';
    loadMarkdown(initialFile);
  </script>
</body>
</html>
