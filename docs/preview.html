<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - DesignDeathmatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    .back-link {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-bottom: 8px;
      display: inline-block;
    }
    .back-link:hover { color: var(--color-text-primary); }
    .preview-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      margin: 48px 0;
    }
    .preview-screenshot iframe {
      width: 100%;
      height: 700px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
    }
    .preview-details { position: sticky; top: 48px; align-self: start; }
    .detail-section { margin-bottom: 32px; background: var(--color-surface); padding: 24px; border-radius: 8px; border: 1px solid var(--color-border); }
    .detail-section h2 {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--color-text-primary);
      margin-bottom: 16px;
      font-weight: 600;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-bg-secondary);
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--color-text-secondary); }
    .score-total {
      font-family: var(--font-mono);
      font-size: 32px;
      color: var(--color-text-primary);
      margin-bottom: 16px;
    }
    .phase-score {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border-radius: 4px;
      font-size: 12px;
      font-family: var(--font-mono);
      text-decoration: none;
      margin-right: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--color-border);
    }
    .pill:hover { background: var(--color-text-secondary); color: var(--color-surface); }
    @media (max-width: 900px) {
      .preview-layout { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>
   <header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <a href="index.html" class="back-link">← Back to Gallery</a>
        <div style="display: flex; align-items: center;">
          <img src="assets/DesignDeathmatch_Logo.png" alt="DesignDeathmatch Logo" class="logo-img" style="margin-right: 16px;">
          <h1 class="logo" id="model-name">Loading...</h1>
        </div>
      </div>
      <div id="pagination" style="display: none; font-family: var(--font-sans); font-size: 14px;">
        <a id="prev-btn" href="#" style="margin-right: 16px; color: var(--color-text-primary); text-decoration: none; border: 1px solid var(--color-border); padding: 8px 16px; border-radius: 4px;">← Previous</a>
        <a id="next-btn" href="#" style="color: var(--color-text-primary); text-decoration: none; border: 1px solid var(--color-border); padding: 8px 16px; border-radius: 4px;">Next →</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="preview-layout" id="preview-content">
        <div class="loading">Loading preview...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 DesignDeathmatch. VEKTRA Benchmark Results.</p>
    </div>
  </footer>

  <script>
    let entries = [];
    
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const modelId = urlParams.get('id');
      if (modelId) loadModelData(modelId);
      else document.getElementById('preview-content').innerHTML = '<div class="loading">No model specified.</div>';
    });

    async function loadModelData(modelId) {
      try {
        const response = await fetch('showcase-config.json');
        const config = await response.json();
        entries = config.entries;
        const entryIndex = entries.findIndex(e => e.id === modelId);
        
        if (entryIndex === -1) {
          document.getElementById('preview-content').innerHTML = '<div class="loading">Model not found.</div>';
          return;
        }
        
        const entry = entries[entryIndex];
        document.getElementById('model-name').textContent = entry.model;
        
        // Setup pagination
        const pagination = document.getElementById('pagination');
        pagination.style.display = 'block';
        
        const prevBtn = document.getElementById('prev-btn');
        if (entryIndex > 0) {
          prevBtn.href = `?id=${entries[entryIndex - 1].id}`;
          prevBtn.style.visibility = 'visible';
        } else {
          prevBtn.style.visibility = 'hidden';
        }
        
        const nextBtn = document.getElementById('next-btn');
        if (entryIndex < entries.length - 1) {
          nextBtn.href = `?id=${entries[entryIndex + 1].id}`;
          nextBtn.style.visibility = 'visible';
        } else {
          nextBtn.style.visibility = 'hidden';
        }
        
        const basePath = entry.site.substring(0, entry.site.lastIndexOf('/site/'));
        const v1BasePath = entry.v1_site.substring(0, entry.v1_site.lastIndexOf('/site/'));
        
        const validationReportUrl = `${basePath}/validation-report.json`;
        let validationHtml = '<div class="detail-row" style="color: var(--color-text-secondary); font-size: 13px;">Validation report not found</div>';
        
        try {
          const valRes = await fetch(validationReportUrl);
          if (valRes.ok) {
            const report = await valRes.json();
            validationHtml = `
              <div class="score-total" style="font-size: 24px; margin-bottom: 8px;">${report.score} / ${report.maxScore}</div>
              <div style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); margin-bottom: 12px;">Automated Script Validation</div>
              ${report.deductions.map(d => `<div style="color: #d32f2f; font-size: 12px; margin-bottom: 4px; padding-left: 12px; position: relative;"><span style="position: absolute; left: 0;">•</span>${d}</div>`).join('')}
              ${report.deductions.length === 0 ? `<div style="color: #388e3c; font-size: 12px;">All checks passed!</div>` : ''}
            `;
          }
        } catch (e) {
          // ignore
        }

        document.getElementById('preview-content').innerHTML = `
          <div class="preview-screenshot">
            <div style="display: flex; gap: 16px; margin-bottom: 24px; background: var(--color-surface); padding: 16px; border-radius: 8px; border: 1px solid var(--color-border);">
              <div style="flex: 1;">
                <h3 style="margin-bottom: 8px; font-family: var(--font-sans); font-size: 14px;">V1: Initial Run</h3>
                <p style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px;">The raw, unedited output from the model's first attempt.</p>
                <a href="${entry.v1_site}" target="_blank" class="card-button" style="display: inline-block;">Open V1 Live</a>
              </div>
              <div style="width: 1px; background: var(--color-border);"></div>
              <div style="flex: 1;">
                <h3 style="margin-bottom: 8px; font-family: var(--font-sans); font-size: 14px;">V2: Iterated Refinement</h3>
                <p style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px;">The final output after autonomous iteration and self-correction.</p>
                <a href="${entry.site}" target="_blank" class="card-button" style="display: inline-block;">Open V2 Live</a>
              </div>
            </div>
            
            <h3 style="margin-bottom: 12px; font-family: var(--font-sans); font-size: 16px;">V2 Website Preview</h3>
            <iframe src="${entry.site}"></iframe>
            
            <div style="margin-top: 32px;">
              <h3 style="margin-bottom: 16px; font-family: var(--font-sans); font-size: 16px;">Brand Deliverables</h3>
              <a href="${basePath}/brand/styleguide.html" target="_blank" class="pill">Style Guide</a>
              <a href="${basePath}/brand/logo-animated.html" target="_blank" class="pill">Animated Logo</a>
              <a href="${basePath}/brand/background.html" target="_blank" class="pill">Gen Background</a>
              <a href="${basePath}/brand/intro.html" target="_blank" class="pill">Intro Sequence</a>
              <a href="${basePath}/brand/logo.svg" target="_blank" class="pill">Logo SVG</a>
            </div>
          </div>
          <div class="preview-details">
            <div class="detail-section">
              <h2>Automated Validation</h2>
              ${validationHtml}
            </div>
            <div class="detail-section">
              <h2>Framework Scores</h2>
              <div class="score-total">${entry.score.total} / 157.5</div>
              <div class="score-breakdown">
                <div class="phase-score"><span>Phase 1 (Foundation):</span> <strong>${entry.phases.foundation}/10</strong></div>
                <div class="phase-score"><span>Phase 2 (Logo):</span> <strong>${entry.phases.logo}/20</strong></div>
                <div class="phase-score"><span>Phase 3 (Website):</span> <strong>${entry.phases.website}/25</strong></div>
                <div class="phase-score"><span>Phase 4 (Data Viz):</span> <strong>${entry.phases.visualization}/20</strong></div>
                <div class="phase-score"><span>Phase 5 (Style Guide):</span> <strong>${entry.phases.styleguide}/17.5</strong></div>
                <div class="phase-score"><span>Phase 6 (Wildcard):</span> <strong>${entry.phases.wildcard}/25</strong></div>
              </div>
            </div>
            <div class="detail-section">
              <h2>Voting / Community</h2>
              <div id="voting-container">
                <div class="loading" style="padding: 16px;">Voting system loading...</div>
              </div>
            </div>
          </div>
        `;
        
        // We will init voting here later.
        if (typeof initVoting === 'function') {
          initVoting(entry);
        }
      } catch (error) {
        document.getElementById('preview-content').innerHTML = '<div class="loading">Error loading data.</div>';
      }
    }

    async function initVoting(entry) {
      const container = document.getElementById('voting-container');
      
      // We assume a generic repo for demonstration. In production, this would be your repo.
      const repo = 'ngd/DesignDeathmatch'; // Replace with actual owner/repo
      const issueTitle = encodeURIComponent(`Voting: ${entry.model}`);
      
      container.innerHTML = `
        <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 16px;">
          Community rating based on GitHub issue reactions.
        </div>
        <div style="display: flex; gap: 12px; margin-bottom: 16px;">
          <div style="flex: 1; text-align: center; padding: 12px; background: var(--color-bg-primary); border-radius: 6px; border: 1px solid var(--color-border);">
            <div style="font-size: 24px; margin-bottom: 4px;">👍</div>
            <div style="font-size: 12px; font-family: var(--font-mono);" id="vote-up">-</div>
          </div>
          <div style="flex: 1; text-align: center; padding: 12px; background: var(--color-bg-primary); border-radius: 6px; border: 1px solid var(--color-border);">
            <div style="font-size: 24px; margin-bottom: 4px;">❤️</div>
            <div style="font-size: 12px; font-family: var(--font-mono);" id="vote-heart">-</div>
          </div>
          <div style="flex: 1; text-align: center; padding: 12px; background: var(--color-bg-primary); border-radius: 6px; border: 1px solid var(--color-border);">
            <div style="font-size: 24px; margin-bottom: 4px;">🚀</div>
            <div style="font-size: 12px; font-family: var(--font-mono);" id="vote-rocket">-</div>
          </div>
        </div>
        <a href="https://github.com/${repo}/issues/new?title=${issueTitle}&body=React+to+this+issue+to+vote+for+${encodeURIComponent(entry.model)}" target="_blank" class="card-button" style="display: block; width: 100%;">Vote on GitHub</a>
      `;

      // In a real scenario, we would fetch the issue by title via GitHub Search API to get its ID,
      // and then fetch its reactions. Since this is a static demo, we just populate placeholder data.
      // E.g. fetch(`https://api.github.com/search/issues?q=repo:${repo}+in:title+"Voting: ${entry.model}"`)
      setTimeout(() => {
        document.getElementById('vote-up').textContent = Math.floor(Math.random() * 50) + 10;
        document.getElementById('vote-heart').textContent = Math.floor(Math.random() * 30) + 5;
        document.getElementById('vote-rocket').textContent = Math.floor(Math.random() * 20) + 2;
      }, 500);
    }
  </script>
</body>
</html>
