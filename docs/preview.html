<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - DesignDeathmatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    .back-link {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-bottom: 8px;
      display: inline-block;
    }
    .back-link:hover { color: var(--color-accent); }
    .preview-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      margin: 48px 0;
    }
    .preview-screenshot img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--color-border);
    }
    .preview-details { position: sticky; top: 48px; align-self: start; }
    .detail-section { margin-bottom: 32px; }
    .detail-section h2 {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--color-accent);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 14px;
    }
    .detail-label { color: var(--color-text-secondary); }
    .score-total {
      font-family: var(--font-mono);
      font-size: 32px;
      color: var(--color-accent);
      margin-bottom: 16px;
    }
    .phase-score {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .preview-layout { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="back-link">← Back to Gallery</a>
      <div style="display: flex; align-items: center;">
        <img src="assets/DesignDeathmatch_Logo.png" alt="DesignDeathmatch Logo" style="height: 40px; margin-right: 16px;">
        <h1 class="logo" id="model-name">Loading...</h1>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="preview-layout" id="preview-content">
        <div class="loading">Loading preview...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 DesignDeathmatch. VEKTRA Benchmark Results.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const modelId = urlParams.get('id');
      if (modelId) loadModelData(modelId);
      else document.getElementById('preview-content').innerHTML = '<div class="loading">No model specified.</div>';
    });

    async function loadModelData(modelId) {
      try {
        const response = await fetch('showcase-config.json');
        const config = await response.json();
        const entry = config.entries.find(e => e.id === modelId);
        if (!entry) {
          document.getElementById('preview-content').innerHTML = '<div class="loading">Model not found.</div>';
          return;
        }
        document.getElementById('model-name').textContent = entry.model;
        document.getElementById('preview-content').innerHTML = `
          <div class="preview-screenshot">
            <img src="${entry.screenshot}" alt="${entry.model} full screenshot" style="width: 100%; border-radius: 8px; border: 1px solid var(--color-border); margin-bottom: 24px;">
            <h3 style="margin-bottom: 12px; color: var(--color-accent);">Live Website Preview</h3>
            <iframe src="${entry.site}" width="100%" height="600" frameborder="0" style="border: 1px solid var(--color-border); border-radius: 8px;"></iframe>
          </div>
          <div class="preview-details">
            <div class="detail-section">
              <h2>Model Information</h2>
              <div class="detail-row"><span class="detail-label">Model:</span> <span>${entry.model}</span></div>
              <div class="detail-row"><span class="detail-label">Version:</span> <span>${entry.version}</span></div>
            </div>
            <div class="detail-section">
              <h2>Scores</h2>
              <div class="score-total">${entry.score.total} / 157.5</div>
              <div class="score-breakdown">
                <div class="phase-score"><span>Phase 1:</span> <strong>${entry.phases.foundation}/10</strong></div>
                <div class="phase-score"><span>Phase 2:</span> <strong>${entry.phases.logo}/20</strong></div>
                <div class="phase-score"><span>Phase 3:</span> <strong>${entry.phases.website}/25</strong></div>
                <div class="phase-score"><span>Phase 4:</span> <strong>${entry.phases.visualization}/20</strong></div>
                <div class="phase-score"><span>Phase 5:</span> <strong>${entry.phases.styleguide}/17.5</strong></div>
                <div class="phase-score"><span>Phase 6:</span> <strong>${entry.phases.wildcard}/25</strong></div>
              </div>
            </div>
          </div>
        `;
      } catch (error) {
        document.getElementById('preview-content').innerHTML = '<div class="loading">Error loading data.</div>';
      }
    }
  </script>
</body>
</html>
