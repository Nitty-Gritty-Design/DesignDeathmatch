<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - DesignDeathmatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    .back-link {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-bottom: 8px;
      display: inline-block;
    }
    .back-link:hover { color: var(--color-text-primary); }
    .preview-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 48px;
      margin: 48px 0;
    }
    .preview-screenshot iframe {
      width: 100%;
      height: 700px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      margin-bottom: 48px;
    }
    .preview-details { position: sticky; top: 48px; align-self: start; }
    .detail-section { margin-bottom: 32px; background: var(--color-surface); padding: 24px; border-radius: 8px; border: 1px solid var(--color-border); }
    .detail-section h2 {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--color-text-primary);
      margin-bottom: 16px;
      font-weight: 600;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-bg-secondary);
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--color-text-secondary); }
    .score-total {
      font-family: var(--font-mono);
      font-size: 32px;
      color: var(--color-text-primary);
      margin-bottom: 16px;
    }
    .phase-score {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .pill {
      display: inline-block;
      padding: 6px 12px;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-mono);
      text-decoration: none;
      margin-right: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--color-border);
      transition: all 0.2s;
    }
    .pill:hover { background: var(--color-text-primary); color: var(--color-bg-primary); }
    
    .validation-report {
      margin-top: 16px;
    }
    .validation-error {
      color: #d32f2f;
      font-size: 12px;
      margin-bottom: 6px;
      padding-left: 12px;
      position: relative;
      line-height: 1.4;
    }
    .validation-error::before {
      content: '•';
      position: absolute;
      left: 0;
    }
    .validation-success {
      color: #388e3c;
      font-size: 12px;
      font-weight: 500;
    }

    @media (max-width: 1024px) {
      .preview-layout { grid-template-columns: 1fr; gap: 24px; }
      .preview-details { position: static; }
    }
  </style>
</head>
<body>
   <header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <a href="index.html" class="back-link">← Back to Gallery</a>
        <div style="display: flex; align-items: center;">
          <img src="assets/DesignDeathmatch_Logo.png" alt="DesignDeathmatch Logo" class="logo-img" style="margin-right: 16px;">
          <h1 class="logo" id="model-name">Loading...</h1>
        </div>
      </div>
      <div id="pagination" style="display: none; font-family: var(--font-sans); font-size: 14px;">
        <a id="prev-btn" href="#" style="margin-right: 16px; color: var(--color-text-primary); text-decoration: none; border: 1px solid var(--color-border); padding: 8px 16px; border-radius: 4px;">← Previous</a>
        <a id="next-btn" href="#" style="color: var(--color-text-primary); text-decoration: none; border: 1px solid var(--color-border); padding: 8px 16px; border-radius: 4px;">Next →</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="preview-layout" id="preview-content">
        <div class="loading">Loading preview...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 DesignDeathmatch. VEKTRA Benchmark Results.</p>
    </div>
  </footer>

  <script>
    let entries = [];
    
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const modelId = urlParams.get('id');
      if (modelId) loadModelData(modelId);
      else document.getElementById('preview-content').innerHTML = '<div class="loading">No model specified.</div>';
    });

    async function fetchValidation(url) {
      try {
        const res = await fetch(url);
        if (res.ok) return await res.json();
      } catch (e) {}
      return null;
    }

    function renderValidation(report, title) {
      if (!report) {
        return `<div class="validation-report"><div style="color: var(--color-text-secondary); font-size: 13px;">Validation report not found</div></div>`;
      }
      return `
        <div class="validation-report">
          <div class="score-total" style="font-size: 24px; margin-bottom: 8px;">${report.score} / ${report.maxScore}</div>
          <div style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); margin-bottom: 12px;">${title}</div>
          ${report.deductions.map(d => `<div class="validation-error">${d}</div>`).join('')}
          ${report.deductions.length === 0 ? `<div class="validation-success">All checks passed!</div>` : ''}
        </div>
      `;
    }

    async function loadModelData(modelId) {
      try {
        const response = await fetch('showcase-config.json');
        const config = await response.json();
        entries = config.entries;
        const entryIndex = entries.findIndex(e => e.id === modelId);
        
        if (entryIndex === -1) {
          document.getElementById('preview-content').innerHTML = '<div class="loading">Model not found.</div>';
          return;
        }
        
        const entry = entries[entryIndex];
        document.getElementById('model-name').textContent = entry.model;
        
        // Setup pagination
        const pagination = document.getElementById('pagination');
        pagination.style.display = 'block';
        
        const prevBtn = document.getElementById('prev-btn');
        if (entryIndex > 0) {
          prevBtn.href = `?id=${entries[entryIndex - 1].id}`;
          prevBtn.style.visibility = 'visible';
        } else {
          prevBtn.style.visibility = 'hidden';
        }
        
        const nextBtn = document.getElementById('next-btn');
        if (entryIndex < entries.length - 1) {
          nextBtn.href = `?id=${entries[entryIndex + 1].id}`;
          nextBtn.style.visibility = 'visible';
        } else {
          nextBtn.style.visibility = 'hidden';
        }
        
        // Base paths based on entry.id for robust validation finding
        const v1BaseUrl = `runs/${entry.id}/VEKTRA`;
        const v2BaseUrl = `runs/${entry.id}/VEKTRA/v2`;
        
        const v1Report = await fetchValidation(`${v1BaseUrl}/validation-report.json`);
        const v2Report = await fetchValidation(`${v2BaseUrl}/validation-report.json`);
        
        document.getElementById('preview-content').innerHTML = `
          <div class="preview-screenshot">
            
            <div style="margin-bottom: 48px; background: var(--color-surface); padding: 24px; border-radius: 8px; border: 1px solid var(--color-border);">
              <h3 style="margin-bottom: 8px; font-family: var(--font-sans); font-size: 18px;">Brand Deliverables (V1)</h3>
              <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 20px;">
                Assets successfully extracted from the model's initial isolated run. 
              </p>
              <div id="deliverables-container">
                <!-- Using V1 path where deliverables were generated reliably in the correct structure -->
                <a href="${v1BaseUrl}/brand/styleguide.html" target="_blank" class="pill">Style Guide</a>
                <a href="${v1BaseUrl}/brand/logo-animated.html" target="_blank" class="pill">Animated Logo</a>
                <a href="${v1BaseUrl}/brand/background.html" target="_blank" class="pill">Gen Background</a>
                <a href="${v1BaseUrl}/brand/intro.html" target="_blank" class="pill">Intro Sequence</a>
                <a href="${v1BaseUrl}/brand/logo.svg" target="_blank" class="pill">Logo SVG</a>
              </div>
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
              <h3 style="font-family: var(--font-sans); font-size: 18px; margin: 0;">V1 Website Preview</h3>
              <a href="${entry.v1_site}" target="_blank" class="card-button" style="margin: 0; padding: 6px 12px; font-size: 12px;">Open Fullscreen</a>
            </div>
            <iframe src="${entry.v1_site}"></iframe>
            
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
              <h3 style="font-family: var(--font-sans); font-size: 18px; margin: 0;">V2 Website Preview (Refinement)</h3>
              <a href="${entry.site}" target="_blank" class="card-button" style="margin: 0; padding: 6px 12px; font-size: 12px;">Open Fullscreen</a>
            </div>
            <iframe src="${entry.site}"></iframe>

          </div>
          
          <div class="preview-details">
            <!-- Overall Score Summary -->
            <div class="detail-section" style="border-top: 4px solid var(--color-text-primary);">
              <h2 style="font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; border: none; padding: 0;">Overall Score</h2>
              <div style="display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px;">
                <span style="font-size: 42px; font-family: var(--font-mono); font-weight: 600; color: var(--color-text-primary);">${entry.score.total.toFixed(1)}</span>
                <span style="font-size: 18px; color: var(--color-text-secondary); font-family: var(--font-mono);">/ 157.5</span>
              </div>
              <div style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); margin-bottom: 16px;">Consolidated Benchmark Result</div>
              
              <div style="background: var(--color-bg-primary); padding: 12px; border-radius: 4px; border: 1px solid var(--color-border);">
                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                  <span style="color: var(--color-text-secondary);">Automated Validation</span>
                  <span style="font-weight: 600;">${entry.score.automated} / 127.5</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 11px;">
                  <span style="color: var(--color-text-secondary);">Human Review</span>
                  <span style="font-weight: 600;">${entry.score.human.toFixed(1)} / 30.0</span>
                </div>
              </div>
            </div>

            <!-- Community Feedback -->
            <div class="detail-section">
              <h2 style="font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em;">Community Feedback</h2>
              <div id="voting-container">
                <div class="loading" style="padding: 16px; font-size: 13px;">Syncing with GitHub...</div>
              </div>
              
              <a href="scoring.html?id=${entry.id}" class="card-button" style="display: block; width: 100%; margin: 16px 0 0; box-sizing: border-box; text-align: center; background: var(--color-text-primary); color: var(--color-bg-primary);">Rate this Model</a>
            </div>

            <div class="detail-section">
              <h2>Technical Validation Details</h2>
              
              <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px;">
                <div>
                  <h3 style="font-size: 14px; color: var(--color-text-primary); margin: 0;">V1: Initial Run</h3>
                </div>
                <div style="font-family: var(--font-mono); font-weight: 600; font-size: 18px;">${entry.score.v1} <span style="font-size: 12px; font-weight: 400; color: var(--color-text-secondary);">/ 127.5</span></div>
              </div>
              ${renderValidation(v1Report, "V1 Results")}
              
              <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 24px 0;">
              
              <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px;">
                <div>
                  <h3 style="font-size: 14px; color: var(--color-text-primary); margin: 0;">V2: Refinement</h3>
                </div>
                <div style="font-family: var(--font-mono); font-weight: 600; font-size: 18px;">${entry.score.v2} <span style="font-size: 12px; font-weight: 400; color: var(--color-text-secondary);">/ 127.5</span></div>
              </div>
              ${renderValidation(v2Report, "V2 Results")}
            </div>

            <div class="detail-section">
              <h2>Phase Breakdown (Max Effort)</h2>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div style="font-size: 12px;">
                  <div style="color: var(--color-text-secondary);">Foundation</div>
                  <div style="font-weight: 600; font-family: var(--font-mono);">${entry.phases.foundation} / 10</div>
                </div>
                <div style="font-size: 12px;">
                  <div style="color: var(--color-text-secondary);">Logo</div>
                  <div style="font-weight: 600; font-family: var(--font-mono);">${entry.phases.logo} / 20</div>
                </div>
                <div style="font-size: 12px;">
                  <div style="color: var(--color-text-secondary);">Website</div>
                  <div style="font-weight: 600; font-family: var(--font-mono);">${entry.phases.website} / 25</div>
                </div>
                <div style="font-size: 12px;">
                  <div style="color: var(--color-text-secondary);">Data Viz</div>
                  <div style="font-weight: 600; font-family: var(--font-mono);">${entry.phases.visualization} / 20</div>
                </div>
                <div style="font-size: 12px;">
                  <div style="color: var(--color-text-secondary);">Style Guide</div>
                  <div style="font-weight: 600; font-family: var(--font-mono);">${entry.phases.styleguide} / 17.5</div>
                </div>
                <div style="font-size: 12px;">
                  <div style="color: var(--color-text-secondary);">Wildcard</div>
                  <div style="font-weight: 600; font-family: var(--font-mono);">${entry.phases.wildcard} / 25</div>
                </div>
              </div>
            </div>
          </div>
        `;
        
        initVoting(entry);

      } catch (error) {
        document.getElementById('preview-content').innerHTML = '<div class="loading">Error loading data.</div>';
      }
    }

    async function initVoting(entry) {
      const container = document.getElementById('voting-container');
      
      // Try to detect repo from URL if on GitHub Pages
      let repo = 'Nitty-Gritty-Design/DesignDeathmatch';
      const host = window.location.hostname;
      if (host.includes('github.io')) {
        const user = host.split('.')[0];
        const repoName = window.location.pathname.split('/')[1];
        if (repoName && repoName !== 'preview.html') {
          repo = `${user}/${repoName}`;
        }
      }

      try {
        // Search for both official voting issues and human score submissions
        const query = encodeURIComponent(`repo:${repo} "${entry.model}" type:issue`);
        const res = await fetch(`https://api.github.com/search/issues?q=${query}`);
        
        if (res.ok) {
          const data = await res.json();
          
          if (data.items && data.items.length > 0) {
            // Aggregate reactions across relevant issues
            let totalReactions = 0;
            let reviewCount = 0;
            
            data.items.forEach(issue => {
              const reactions = issue.reactions || {};
              totalReactions += (reactions['+1'] || 0) + (reactions['heart'] || 0) + (reactions['rocket'] || 0);
              if (issue.title.includes('[HUMAN-SCORE]')) {
                reviewCount++;
              }
            });
            
            container.innerHTML = `
              <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <div style="text-align: center; flex: 1;">
                  <div style="font-size: 20px; font-family: var(--font-mono); color: var(--color-text-primary); font-weight: 600;">${totalReactions}</div>
                  <div style="font-size: 9px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">GitHub Reactions</div>
                </div>
                <div style="width: 1px; height: 24px; background: var(--color-border);"></div>
                <div style="text-align: center; flex: 1;">
                  <div style="font-size: 20px; font-family: var(--font-mono); color: var(--color-text-primary); font-weight: 600;">${entry.score.human.toFixed(1)}</div>
                  <div style="font-size: 9px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Human Review Avg</div>
                </div>
              </div>
              ${reviewCount > 0 ? `<div style="font-size: 11px; text-align: center; color: var(--color-text-secondary); margin-top: 8px;">Based on ${reviewCount} community review${reviewCount > 1 ? 's' : ''}</div>` : ''}
            `;
          } else {
            container.innerHTML = `
              <div style="text-align: center; padding: 8px 0;">
                <div style="font-size: 13px; color: var(--color-text-secondary);">No community activity yet.</div>
              </div>
            `;
          }
        }
      } catch (e) {
        container.innerHTML = '<div style="font-size: 12px; color: #d32f2f; text-align: center;">Sync unavailable</div>';
      }
    }
  </script>
</body>
</html>
