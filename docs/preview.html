<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - DesignDeathmatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    .back-link {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-bottom: 8px;
      display: inline-block;
    }
    .back-link:hover { color: var(--color-text-primary); }
    .preview-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 48px;
      margin: 48px 0;
    }
    .preview-screenshot iframe {
      width: 100%;
      height: 700px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      margin-bottom: 48px;
    }
    .preview-details { position: sticky; top: 48px; align-self: start; }
    .detail-section { margin-bottom: 32px; background: var(--color-surface); padding: 24px; border-radius: 8px; border: 1px solid var(--color-border); }
    .detail-section h2 {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--color-text-primary);
      margin-bottom: 16px;
      font-weight: 600;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-bg-secondary);
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--color-text-secondary); }
    .score-total {
      font-family: var(--font-mono);
      font-size: 32px;
      color: var(--color-text-primary);
      margin-bottom: 16px;
    }
    .phase-score {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .pill {
      display: inline-block;
      padding: 6px 12px;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-mono);
      text-decoration: none;
      margin-right: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--color-border);
      transition: all 0.2s;
    }
    .pill:hover { background: var(--color-text-primary); color: var(--color-bg-primary); }
    
    .validation-report {
      margin-top: 16px;
    }
    .validation-error {
      color: #d32f2f;
      font-size: 12px;
      margin-bottom: 6px;
      padding-left: 12px;
      position: relative;
      line-height: 1.4;
    }
    .validation-error::before {
      content: '•';
      position: absolute;
      left: 0;
    }
    .validation-success {
      color: #388e3c;
      font-size: 12px;
      font-weight: 500;
    }

    @media (max-width: 1024px) {
      .preview-layout { grid-template-columns: 1fr; gap: 24px; }
      .preview-details { position: static; }
    }
  </style>
</head>
<body>
   <header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <a href="index.html" class="back-link">← Back to Gallery</a>
        <div style="display: flex; align-items: center;">
          <img src="assets/DesignDeathmatch_Logo.png" alt="DesignDeathmatch Logo" class="logo-img" style="margin-right: 16px;">
          <h1 class="logo" id="model-name">Loading...</h1>
        </div>
      </div>
      <div id="pagination" style="display: none; font-family: var(--font-sans); font-size: 14px;">
        <a id="prev-btn" href="#" style="margin-right: 16px; color: var(--color-text-primary); text-decoration: none; border: 1px solid var(--color-border); padding: 8px 16px; border-radius: 4px;">← Previous</a>
        <a id="next-btn" href="#" style="color: var(--color-text-primary); text-decoration: none; border: 1px solid var(--color-border); padding: 8px 16px; border-radius: 4px;">Next →</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="preview-layout" id="preview-content">
        <div class="loading">Loading preview...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 DesignDeathmatch. VEKTRA Benchmark Results.</p>
    </div>
  </footer>

  <script>
    let entries = [];
    
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const modelId = urlParams.get('id');
      if (modelId) loadModelData(modelId);
      else document.getElementById('preview-content').innerHTML = '<div class="loading">No model specified.</div>';
    });

    async function fetchValidation(url) {
      try {
        const res = await fetch(url);
        if (res.ok) return await res.json();
      } catch (e) {}
      return null;
    }

    function renderValidation(report, title) {
      if (!report) {
        return `<div class="validation-report"><div style="color: var(--color-text-secondary); font-size: 13px;">Validation report not found</div></div>`;
      }
      return `
        <div class="validation-report">
          <div class="score-total" style="font-size: 24px; margin-bottom: 8px;">${report.score} / ${report.maxScore}</div>
          <div style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); margin-bottom: 12px;">${title}</div>
          ${report.deductions.map(d => `<div class="validation-error">${d}</div>`).join('')}
          ${report.deductions.length === 0 ? `<div class="validation-success">All checks passed!</div>` : ''}
        </div>
      `;
    }

    async function loadModelData(modelId) {
      try {
        const response = await fetch('showcase-config.json');
        const config = await response.json();
        entries = config.entries;
        const entryIndex = entries.findIndex(e => e.id === modelId);
        
        if (entryIndex === -1) {
          document.getElementById('preview-content').innerHTML = '<div class="loading">Model not found.</div>';
          return;
        }
        
        const entry = entries[entryIndex];
        document.getElementById('model-name').textContent = entry.model;
        
        // Setup pagination
        const pagination = document.getElementById('pagination');
        pagination.style.display = 'block';
        
        const prevBtn = document.getElementById('prev-btn');
        if (entryIndex > 0) {
          prevBtn.href = `?id=${entries[entryIndex - 1].id}`;
          prevBtn.style.visibility = 'visible';
        } else {
          prevBtn.style.visibility = 'hidden';
        }
        
        const nextBtn = document.getElementById('next-btn');
        if (entryIndex < entries.length - 1) {
          nextBtn.href = `?id=${entries[entryIndex + 1].id}`;
          nextBtn.style.visibility = 'visible';
        } else {
          nextBtn.style.visibility = 'hidden';
        }
        
        // Base paths based on entry.id for robust validation finding
        const v1BaseUrl = `runs/${entry.id}/VEKTRA`;
        const v2BaseUrl = `runs/${entry.id}/VEKTRA/v2`;
        
        const v1Report = await fetchValidation(`${v1BaseUrl}/validation-report.json`);
        const v2Report = await fetchValidation(`${v2BaseUrl}/validation-report.json`);
        
        document.getElementById('preview-content').innerHTML = `
          <div class="preview-screenshot">
            
            <div style="margin-bottom: 48px; background: var(--color-surface); padding: 24px; border-radius: 8px; border: 1px solid var(--color-border);">
              <h3 style="margin-bottom: 8px; font-family: var(--font-sans); font-size: 18px;">Brand Deliverables (V1)</h3>
              <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 20px;">
                Assets successfully extracted from the model's initial isolated run. 
              </p>
              <div id="deliverables-container">
                <!-- Using V1 path where deliverables were generated reliably in the correct structure -->
                <a href="${v1BaseUrl}/brand/styleguide.html" target="_blank" class="pill">Style Guide</a>
                <a href="${v1BaseUrl}/brand/logo-animated.html" target="_blank" class="pill">Animated Logo</a>
                <a href="${v1BaseUrl}/brand/background.html" target="_blank" class="pill">Gen Background</a>
                <a href="${v1BaseUrl}/brand/intro.html" target="_blank" class="pill">Intro Sequence</a>
                <a href="${v1BaseUrl}/brand/logo.svg" target="_blank" class="pill">Logo SVG</a>
              </div>
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
              <h3 style="font-family: var(--font-sans); font-size: 18px; margin: 0;">V1 Website Preview</h3>
              <a href="${entry.v1_site}" target="_blank" class="card-button" style="margin: 0; padding: 6px 12px; font-size: 12px;">Open Fullscreen</a>
            </div>
            <iframe src="${entry.v1_site}"></iframe>
            
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
              <h3 style="font-family: var(--font-sans); font-size: 18px; margin: 0;">V2 Website Preview (Refinement)</h3>
              <a href="${entry.site}" target="_blank" class="card-button" style="margin: 0; padding: 6px 12px; font-size: 12px;">Open Fullscreen</a>
            </div>
            <iframe src="${entry.site}"></iframe>

          </div>
          
          <div class="preview-details">
            <div class="detail-section">
              <h2>Automated Validation</h2>
              
              <h3 style="font-size: 14px; color: var(--color-text-primary); margin-top: 16px; margin-bottom: 4px;">V1 (Initial Run)</h3>
              ${renderValidation(v1Report, "Automated Script Validation")}
              
              <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 24px 0;">
              
              <h3 style="font-size: 14px; color: var(--color-text-primary); margin-bottom: 4px;">V2 (Iterated Refinement)</h3>
              ${renderValidation(v2Report, "Automated Script Validation")}
            </div>

            <div class="detail-section">
              <h2>Framework Scores</h2>
              <div class="score-total">${entry.score.total} / 157.5</div>
              <div style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); margin-bottom: 12px;">Final Combined Score</div>
              <div class="score-breakdown">
                <div class="phase-score"><span>Phase 1 (Foundation):</span> <strong>${entry.phases.foundation}/10</strong></div>
                <div class="phase-score"><span>Phase 2 (Logo):</span> <strong>${entry.phases.logo}/20</strong></div>
                <div class="phase-score"><span>Phase 3 (Website):</span> <strong>${entry.phases.website}/25</strong></div>
                <div class="phase-score"><span>Phase 4 (Data Viz):</span> <strong>${entry.phases.visualization}/20</strong></div>
                <div class="phase-score"><span>Phase 5 (Style Guide):</span> <strong>${entry.phases.styleguide}/17.5</strong></div>
                <div class="phase-score"><span>Phase 6 (Wildcard):</span> <strong>${entry.phases.wildcard}/25</strong></div>
              </div>
            </div>
            
            <div class="detail-section">
              <h2>Voting / Community</h2>
              <div id="voting-container">
                <div class="loading" style="padding: 16px; font-size: 13px;">Loading GitHub reactions...</div>
              </div>
            </div>
          </div>
        `;
        
        initVoting(entry);

      } catch (error) {
        document.getElementById('preview-content').innerHTML = '<div class="loading">Error loading data.</div>';
      }
    }

    async function initVoting(entry) {
      const container = document.getElementById('voting-container');
      const repo = 'Nitty-Gritty-Design/DesignDeathmatch';
      const issueTitle = `Voting: ${entry.model}`;
      
      // We render the UI immediately with loaders
      container.innerHTML = `
        <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 16px;">
          Community rating based on GitHub issue reactions.
        </div>
        <div style="display: flex; gap: 12px; margin-bottom: 16px;">
          <div style="flex: 1; text-align: center; padding: 12px; background: var(--color-bg-primary); border-radius: 6px; border: 1px solid var(--color-border);">
            <div style="font-size: 24px; margin-bottom: 4px;">👍</div>
            <div style="font-size: 14px; font-family: var(--font-mono); font-weight: 600;" id="vote-up">...</div>
          </div>
          <div style="flex: 1; text-align: center; padding: 12px; background: var(--color-bg-primary); border-radius: 6px; border: 1px solid var(--color-border);">
            <div style="font-size: 24px; margin-bottom: 4px;">❤️</div>
            <div style="font-size: 14px; font-family: var(--font-mono); font-weight: 600;" id="vote-heart">...</div>
          </div>
          <div style="flex: 1; text-align: center; padding: 12px; background: var(--color-bg-primary); border-radius: 6px; border: 1px solid var(--color-border);">
            <div style="font-size: 24px; margin-bottom: 4px;">🚀</div>
            <div style="font-size: 14px; font-family: var(--font-mono); font-weight: 600;" id="vote-rocket">...</div>
          </div>
        </div>
        <a id="vote-link" href="#" target="_blank" class="card-button" style="display: block; width: 100%; margin-bottom: 8px;">Loading link...</a>
        <a id="review-link" href="#" class="pill" style="display: block; width: 100%; text-align: center; margin: 0; box-sizing: border-box;">Submit Detailed Review</a>
      `;

      document.getElementById('review-link').href = `scoring.html?id=${entry.id}`;

      try {
        const query = encodeURIComponent(`repo:${repo} in:title "${issueTitle}" type:issue`);
        const res = await fetch(`https://api.github.com/search/issues?q=${query}`);
        
        if (res.ok) {
          const data = await res.json();
          if (data.items && data.items.length > 0) {
            // Issue found, use its reactions and URL
            const issue = data.items[0];
            const reactions = issue.reactions || {};
            
            document.getElementById('vote-up').textContent = reactions['+1'] || 0;
            document.getElementById('vote-heart').textContent = reactions['heart'] || 0;
            document.getElementById('vote-rocket').textContent = reactions['rocket'] || 0;
            
            document.getElementById('vote-link').href = issue.html_url;
            document.getElementById('vote-link').textContent = 'Vote on GitHub';
          } else {
            // Issue not found, default to 0 and provide a creation link
            document.getElementById('vote-up').textContent = 0;
            document.getElementById('vote-heart').textContent = 0;
            document.getElementById('vote-rocket').textContent = 0;
            
            const createUrl = `https://github.com/${repo}/issues/new?title=${encodeURIComponent(issueTitle)}&body=React+to+this+issue+to+vote+for+${encodeURIComponent(entry.model)}`;
            document.getElementById('vote-link').href = createUrl;
            document.getElementById('vote-link').textContent = 'Be the first to vote!';
          }
        }
      } catch (e) {
        document.getElementById('vote-link').textContent = 'Failed to load voting data';
      }
    }
  </script>
</body>
</html>
